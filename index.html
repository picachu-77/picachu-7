<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0d3b2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="피카츄의 배드민턴매치">
<title>⚡ 피카츄의 배드민턴매치</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body {
  --bg:#0d3b2e; --white:#f5f5f0; --muted:rgba(255,255,255,.38);
  --card:rgba(255,255,255,.06); --border:rgba(255,255,255,.11);
  --warn:#f1a035; --red:#f15555; --lime:#c8f135;
  --input-bg:rgba(255,255,255,.09); --fbox-bg:rgba(255,255,255,.05);
  --chip-bg:rgba(255,255,255,.07); --mode-bg:rgba(255,255,255,.06);
  --shadow:0 2px 12px rgba(0,0,0,.3); --tab-active:rgba(200,241,53,.15);
}
body.light {
  --bg:#e8f5e9; --white:#1b2e1b; --muted:rgba(0,0,0,.45);
  --card:rgba(255,255,255,.75); --border:rgba(0,0,0,.12);
  --warn:#e67e00; --red:#d32f2f; --lime:#5a9e00;
  --input-bg:rgba(255,255,255,.9); --fbox-bg:rgba(255,255,255,.6);
  --chip-bg:rgba(255,255,255,.85); --mode-bg:rgba(255,255,255,.7);
  --shadow:0 2px 12px rgba(0,0,0,.1); --tab-active:rgba(90,158,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'DM Sans','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--white);min-height:100vh;overscroll-behavior:none;transition:background .25s,color .25s}
button,input{font-family:inherit;-webkit-appearance:none;appearance:none;border:none}
button{cursor:pointer;touch-action:manipulation}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:4px}

#app{min-height:100vh;display:flex;justify-content:center;padding:0 0 80px;
  background-image:radial-gradient(ellipse at 15% 60%,rgba(200,241,53,.04) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 15%,rgba(53,136,241,.03) 0%,transparent 50%)}
.wrap{width:100%;max-width:480px}

/* ── 상단 헤더 ── */
.app-header{padding:20px 20px 0;text-align:center;position:relative}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--lime)}
.app-sub{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:16px}
.theme-btn{position:absolute;top:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--muted)}
.share-btn{position:absolute;top:20px;left:20px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--muted)}

/* ── 탭 ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin:0 20px}
.tab{flex:1;padding:12px 0;text-align:center;font-weight:700;font-size:14px;
  color:var(--muted);background:transparent;border-bottom:2px solid transparent;
  transition:all .2s;margin-bottom:-1px}
.tab.active{color:var(--lime);border-bottom-color:var(--lime)}

/* ── 콘텐츠 ── */
.content{padding:16px 20px}

/* ── 스텝바 ── */
.sbar{display:flex;align-items:flex-start;justify-content:center;margin-bottom:20px}
.sdot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;transition:all .3s}
.sdot.done,.sdot.active{background:var(--lime);border:2px solid var(--lime);color:#0d3b2e}
.sdot.idle{background:transparent;border:2px solid var(--border);color:var(--muted)}
.slabel{font-size:9px}
.slabel.active{color:var(--lime);font-weight:700}
.slabel.idle{color:var(--muted)}
.sline{width:32px;height:2px;margin:0 2px;margin-bottom:16px}
.sline.done{background:var(--lime)}
.sline.idle{background:var(--border)}

/* ── 카드 ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:12px}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:3px}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.lbl{font-size:12px;color:var(--muted);margin-bottom:5px}

/* ── 뱃지/태그 ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:800}
.tag{display:inline-block;padding:2px 8px;border-radius:16px;font-size:11px;font-weight:700}

/* ── 버튼 ── */
.btn{padding:12px 16px;border-radius:11px;font-weight:700;font-size:14px;min-height:46px;
  transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn.pri{background:var(--lime);color:#0d3b2e}
.btn.gho{background:var(--card);border:1px solid var(--border);color:var(--white)}
.btn.suc{background:rgba(100,200,100,.18);border:1px solid rgba(100,200,100,.35);color:#66cc66}
.btn.dan{background:rgba(241,85,85,.12);border:1px solid rgba(241,85,85,.3);color:var(--red)}
.btn:disabled{opacity:.35;pointer-events:none}
.brow{display:flex;gap:8px}

/* ── 입력 ── */
.inp{width:100%;padding:11px 13px;border-radius:10px;background:var(--input-bg);border:1px solid var(--border);color:var(--white);font-size:15px;outline:none;transition:border .15s}
.inp:focus{border-color:var(--lime)}
.inp.err{border-color:var(--red)}
.err-txt{font-size:11px;color:var(--red);margin-top:3px}

/* ── 등급 토글 ── */
.lv-group{display:flex;gap:4px}
.lv-btn{flex:1;padding:8px 0;border-radius:8px;font-weight:800;font-size:14px;min-height:40px;transition:all .15s;border:1px solid transparent;letter-spacing:1px}
.g-group{display:flex;gap:5px}
.g-btn{flex:1;padding:9px 0;border-radius:9px;font-weight:700;font-size:13px;min-height:42px;transition:all .15s;border:1px solid transparent}

/* ── 명단 ── */
.roster-item{display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:12px;
  background:var(--card);border:1px solid var(--border);margin-bottom:7px;transition:background .15s}
.roster-item.editing{background:var(--fbox-bg);border-color:var(--lime)}
.roster-num{width:22px;height:22px;border-radius:50%;background:var(--lime);color:#0d3b2e;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.roster-info{flex:1;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.roster-name{font-weight:700;font-size:14px}
.roster-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:transparent;padding:4px 7px;border-radius:7px;font-size:14px;color:var(--muted);border:1px solid var(--border)}
.edit-form{display:flex;flex-direction:column;gap:7px;flex:1}

/* ── 참석자 선택 ── */
.attend-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;
  background:var(--card);border:1px solid var(--border);margin-bottom:7px;transition:all .15s;cursor:pointer}
.attend-item.selected{background:var(--tab-active);border-color:var(--lime)}
.attend-item.standby-mark{border-color:var(--warn);background:rgba(241,160,53,.08)}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:13px}
.chk-box.on{background:var(--lime);border-color:var(--lime);color:#0d3b2e}
.attend-info{flex:1}
.attend-name{font-weight:700;font-size:14px;margin-bottom:2px}
.attend-badges{display:flex;gap:4px;flex-wrap:wrap}
.select-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.select-count{font-size:13px;color:var(--muted)}
.select-all-btn{font-size:12px;font-weight:700;color:var(--lime);background:transparent;padding:4px 8px;border-radius:8px;border:1px solid rgba(200,241,53,.3)}

/* ── 팀 구성 ── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.mbtn{padding:10px 11px;border-radius:11px;text-align:left;min-height:54px;
  transition:all .15s;border:1px solid var(--border);background:var(--mode-bg);color:var(--muted);cursor:pointer;width:100%}
.mbtn.active{background:var(--tab-active);border-color:var(--lime);color:var(--lime)}
.mbtn-lbl{font-weight:700;font-size:12px;margin-bottom:2px}
.mbtn-desc{font-size:10px;opacity:.7}
.tcard{padding:11px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:7px}
.tdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#0d3b2e;font-weight:700;font-size:11px;flex-shrink:0}
.lgroup{display:flex;gap:6px;margin-bottom:12px}
.lbtn{flex:1;padding:11px 0;border-radius:10px;font-weight:700;font-size:16px;min-height:46px;transition:all .15s;border:1px solid transparent}
.lbtn.active{background:var(--lime);color:#0d3b2e}
.lbtn.idle{background:var(--card);border:1px solid var(--border);color:var(--muted)}

/* ── 대진표 ── */
.mcard{border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--card);margin-bottom:8px;box-shadow:var(--shadow)}
.mbody{padding:14px 16px;display:flex;align-items:center;gap:7px}
.mteam{flex:1}
.mteam.r{text-align:right}
.mname{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--white)}
.mcenter{text-align:center;min-width:48px;flex-shrink:0}

/* ── 알림/토스트 ── */
.notice{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:11px;margin-bottom:10px}
.notice .ni{font-size:18px;flex-shrink:0;margin-top:1px}
.notice .nt{font-weight:700;font-size:13px}
.notice .ns{font-size:11px;color:var(--muted);margin-top:2px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(0,0,0,.82);color:#fff;padding:9px 18px;border-radius:18px;
  font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 등급 안내 ── */
.grade-guide{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:7px}
.grade-card{padding:10px 12px;border-radius:10px}
.grade-card-header{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.grade-key{font-weight:800;font-size:14px;padding:2px 9px;border-radius:7px}
.grade-short{font-weight:700;font-size:12px}
.grade-desc{font-size:11px;color:var(--muted);margin-bottom:4px}
.grade-ul{padding-left:13px;display:flex;flex-direction:column;gap:2px}
.grade-li{font-size:11px}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-txt{font-size:14px}
.empty-sub{font-size:12px;margin-top:4px;opacity:.7}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════════════════════════
var LV=[{key:'E',sc:0,color:'#90a4ae'},{key:'D',sc:1,color:'#4fc3f7'},
        {key:'C',sc:2,color:'#66bb6a'},{key:'B',sc:3,color:'#f1d035'},
        {key:'A',sc:4,color:'#f18835'},{key:'S',sc:5,color:'#f15555'}];
var LV_INFO={
  E:{short:'아직 시작 단계',desc:'배드민턴을 처음 접하는 수준이에요.',details:['서브를 코트 안에 넣기 어려울 수 있어요','기본기(그립·자세)를 배우는 중','랠리를 3회 이상 이어가기 힘든 수준']},
  D:{short:'기본기 익히는 중',desc:'기초 동작을 배우고 있는 단계예요.',details:['서브를 안정적으로 넣을 수 있음','짧은 랠리(5~10회) 가능','클리어·드롭 등 기본 샷을 시도할 수 있음','풋워크·포지션 개념을 익히는 중']},
  C:{short:'어느 정도 칠 수 있음',desc:'동호회 입문 수준이에요.',details:['클리어·드롭·스매시를 기본적으로 구사','랠리를 어느 정도 이어갈 수 있음','경기 규칙을 알고 게임 진행 가능','코트 전체를 커버하기엔 아직 부족']},
  B:{short:'동호회 중간 수준',desc:'동호회 평균 수준이에요.',details:['안정적인 랠리와 다양한 샷 구사 가능','코트를 넓게 활용하는 플레이','스매시·헤어핀·푸시 등을 적절히 사용','복식 전술(앞뒤·좌우)을 이해하고 있음']},
  A:{short:'잘 치는 편',desc:'동호회 상위 수준이에요.',details:['강하고 정확한 스매시·드롭 구사','리시브가 안정적이고 수비 범위 넓음','전술적 판단으로 상대를 흔드는 플레이','체력·순발력을 바탕으로 한 압박 가능']},
  S:{short:'에이스 수준',desc:'클럽 최상위 수준이에요.',details:['압도적인 기술·체력·전술을 모두 갖춤','공식 동호인 대회 입상 경험 수준','거의 모든 샷을 자유자재로 구사','파트너를 리드하며 경기를 지배하는 수준']}
};
var TC=['#c8f135','#f1d035','#35f1c8','#f13588','#3588f1','#f18835','#a835f1','#35f158'];
var MODES=[
  {key:'random',   lb:'🎲 완전 랜덤', ds:'그냥 섞기'},
  {key:'balanced', lb:'🤝 균형',      ds:'고수↔초보 페어링'},
  {key:'sameclose',lb:'🎯 동급 대결', ds:'비슷한 수준 4명끼리 한 경기'},
  {key:'cycle',    lb:'🔁 순환',      ds:'랜덤→균형→동급 반복'}
];
var CYCLE_MODES=['random','balanced','sameclose'];
var CYCLE_LABELS=['🎲 완전 랜덤','🤝 균형','🎯 동급 대결'];
function getCycleMode(roundIdx){return CYCLE_MODES[roundIdx%3];}
function getCycleLabel(roundIdx){return CYCLE_LABELS[roundIdx%3];}

// ══════════════════════════════════════════════════════════════════
// 상태
// ══════════════════════════════════════════════════════════════════
var _composing=false; // 한글 조합 중 여부 (IME)
var S={
  // 앱 전역
  tab:'match',   // 'roster' | 'match'
  theme:'dark',
  // 전체 명단 (영구저장)
  roster:[],
  // 명단 관리 UI
  rAddName:'', rAddGender:'남', rAddLevel:'C',
  rEditIdx:-1, rEditName:'', rEditGender:'남', rEditLevel:'C',
  rShowGrade:false,
  // 매치
  mStep:1,       // 1:참석자선택 2:팀구성 3:대진표 4:순위
  selected:{},      // {이름: true}
  attendSearch:'',  // 참석자 검색어
  playerGroups:{},  // {이름: 1 or 2} — 참석자 그룹 배정
  groupNames:['1그룹','2그룹'], // 그룹 이름 (수정 가능)
  standby:null, teams:[], matches:[],
  pairMode:'random', history:[], round:1, dup:false,
  numGames:0,    // 0 = 전체, 양수 = 해당 게임 수만
  matchMode:'roundrobin', // 'roundrobin' | 'mixed' | 'rotation'
  numRotations:3, // 로테이션 세트 수
  blockInfo:[],   // [{blockNum, standby, dup}] — 로테이션 세트 정보
  groups:{},     // {teamId: 1 or 2} — 혼합 모드 그룹 배정
  restCount:{},  // {이름: 쉰 횟수} — 세션 내 누적
};

// ══════════════════════════════════════════════════════════════════
// localStorage
// ══════════════════════════════════════════════════════════════════
function lsSave(){try{localStorage.setItem('bdm_roster',JSON.stringify(S.roster));localStorage.setItem('bdm_theme',S.theme);localStorage.setItem('bdm_gnames',JSON.stringify(S.groupNames));}catch(e){}}
function lsLoad(){try{var r=localStorage.getItem('bdm_roster');if(r)S.roster=JSON.parse(r);var t=localStorage.getItem('bdm_theme');if(t)S.theme=t;var g=localStorage.getItem('bdm_gnames');if(g)S.groupNames=JSON.parse(g);}catch(e){}}

// ══════════════════════════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════════════════════════
function shuf(a){var r=a.slice(),i,j,t;for(i=r.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));t=r[i];r[i]=r[j];r[j]=t;}return r;}
function pk(a,b){return[a.name,b.name].sort().join('||');}
function lsc(p){for(var i=0;i<LV.length;i++)if(LV[i].key===p.level)return LV[i].sc;return 0;}
function linfo(k){for(var i=0;i<LV.length;i++)if(LV[i].key===k)return LV[i];return LV[0];}
function hasDup(ts,h){var i,j,key;h=h||S.history;for(i=0;i<ts.length;i++){key=pk(ts[i].p1,ts[i].p2);for(j=0;j<h.length;j++)if(h[j]===key)return true;}return false;}
function pairUp(arr){var t=[];for(var i=0;i<arr.length-1;i+=2)t.push({id:i/2,p1:arr[i],p2:arr[i+1]});return t;}
function getSelected(){return S.roster.filter(function(p){return S.selected[p.name];});}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2200);}

// ══════════════════════════════════════════════════════════════════
// 팀 구성 로직
// ══════════════════════════════════════════════════════════════════
function bRandom(ps,h){for(var t=0;t<60;t++){var ts=pairUp(shuf(ps));if(!hasDup(ts,h))return{teams:ts,dup:false};}return{teams:pairUp(shuf(ps)),dup:true};}
function bBal(ps,h){
  // 최대 60번 재시도해서 중복 파트너 최소화
  for(var t=0;t<60;t++){
    var s=ps.slice().sort(function(a,b){return lsc(b)-lsc(a);});
    var n=Math.floor(s.length/2),top=shuf(s.slice(0,n)),bot=shuf(s.slice(n)),teams=[],i;
    for(i=0;i<top.length;i++)teams.push({id:i,p1:top[i],p2:bot[i]});
    if(!hasDup(teams,h)) return{teams:teams,dup:false};
  }
  // 60번 시도 후도 겹치면 그냥 반환
  var s=ps.slice().sort(function(a,b){return lsc(b)-lsc(a);});
  var n=Math.floor(s.length/2),top=shuf(s.slice(0,n)),bot=shuf(s.slice(n)),teams=[],i;
  for(i=0;i<top.length;i++)teams.push({id:i,p1:top[i],p2:bot[i]});
  return{teams:teams,dup:true};
}
// 동급 대결: 급수 순 정렬 → 4명씩 묶어서 그 안에서 랜덤 페어
// → 한 경기의 4명이 최대한 비슷한 수준
function bSameLevel(ps,h){
  var s=ps.slice().sort(function(a,b){return lsc(a)-lsc(b);});
  var teams=[],id=0,i;
  for(i=0;i+3<s.length;i+=4){
    var g=s.slice(i,i+4);
    // 3가지 페어링 중 중복 없는 걸 우선 선택 (랜덤 순서로 시도)
    var opts=shuf([[0,1,2,3],[0,2,1,3],[0,3,1,2]]);
    var chosen=opts[0];
    for(var o=0;o<opts.length;o++){
      var c=opts[o];
      var ta={id:id,p1:g[c[0]],p2:g[c[1]]},tb={id:id+1,p1:g[c[2]],p2:g[c[3]]};
      if(!hasDup([ta,tb],h)){chosen=c;break;}
    }
    teams.push({id:id++,p1:g[chosen[0]],p2:g[chosen[1]]});
    teams.push({id:id++,p1:g[chosen[2]],p2:g[chosen[3]]});
  }
  // 나머지 인원 처리 (4의 배수가 아닐 때)
  var left=s.slice(i);
  while(left.length>=2) teams.push({id:id++,p1:left.shift(),p2:left.shift()});
  return{teams:teams,dup:hasDup(teams,h)};
}
function buildWithMode(ps,h,mode){
  if(mode==='balanced') return bBal(ps,h);
  if(mode==='sameclose') return bSameLevel(ps,h);
  return bRandom(ps,h);
}
function build(ps,h){
  var mode=S.pairMode==='cycle'?getCycleMode(S.round-1):S.pairMode;
  return buildWithMode(ps,h,mode);
}
// 팀 평균 급수 계산
function teamAvgLv(t){return lsc(t.p1)+lsc(t.p2);}
// 두 팀 간 급수 차이
function teamLvDiff(ta,tb){return Math.abs(teamAvgLv(ta)-teamAvgLv(tb));}
function pickSB(ps,prevSB,rc){
  rc=rc||S.restCount;
  var sorted=ps.slice().sort(function(a,b){return (rc[a.name]||0)-(rc[b.name]||0);});
  var other=sorted.filter(function(p){return!prevSB||p.name!==prevSB.name;});
  return other.length?other[0]:sorted[0];
}
function doTeams(){
  var ps=getSelected(),isOdd=ps.length%2,ac=ps,sb=null;
  if(isOdd){sb=pickSB(ps,S.standby,S.restCount);ac=ps.filter(function(p){return p.name!==sb.name;});}
  S.standby=sb;S.groups={};

  if(S.matchMode==='mixed'){
    var g1=ac.filter(function(p){return (S.playerGroups[p.name]||1)===1;});
    var g2=ac.filter(function(p){return (S.playerGroups[p.name]||1)===2;});
    if(g1.length%2!==0&&g1.length>0){g2.push(g1.pop());}
    if(g2.length%2!==0&&g2.length>0){g1.push(g2.pop());}
    var r1=g1.length>=2?build(g1):{teams:[],dup:false};
    var r2=g2.length>=2?build(g2):{teams:[],dup:false};
    var allTeams=[],id=0;
    for(var i=0;i<r1.teams.length;i++){r1.teams[i].id=id++;allTeams.push(r1.teams[i]);S.groups[r1.teams[i].id]=1;}
    for(var i=0;i<r2.teams.length;i++){r2.teams[i].id=id++;allTeams.push(r2.teams[i]);S.groups[r2.teams[i].id]=2;}
    S.teams=allTeams;S.dup=r1.dup||r2.dup;
  } else {
    var r=build(ac);S.teams=r.teams;S.dup=r.dup;
  }
}

// 로테이션 스케줄 생성 (세트마다 팀 재배정)
function mkRotationSchedule(){
  var ps=getSelected();
  var tempH=S.history.slice();
  var tempSB=S.standby;
  var tempRC={};for(var k in S.restCount)tempRC[k]=S.restCount[k];
  var allTeams=[],allMatches=[],blockInfo=[];
  var teamId=0,matchId=0;

  // 세트당 게임 수 = 참석자 수 / 4 (모두 동시에 뜀)
  var gamesPerSet=Math.max(1,Math.floor(ps.length/4));
  // 게임 수 → 세트 수 자동 계산 (공란이면 기본 3세트)
  var numRot=S.numGames>0?Math.max(1,Math.ceil(S.numGames/gamesPerSet)):3;
  for(var b=0;b<numRot;b++){
    var isOdd=ps.length%2,ac=ps,sb=null;
    if(isOdd){
      sb=pickSB(ps,tempSB,tempRC);
      ac=ps.filter(function(p){return p.name!==sb.name;});
      if(sb) tempRC[sb.name]=(tempRC[sb.name]||0)+1;
      tempSB=sb;
    }
    // 최소 4명(2팀) 필요 — 그 미만이면 블록 스킵
    if(ac.length<4){blockInfo.push({blockNum:b+1,standby:sb,dup:false,skip:true,modeLabel:''});continue;}
    // 순환 모드: 블록마다 다른 팀 구성 방식
    var blockMode=S.pairMode==='cycle'?getCycleMode(b):S.pairMode;
    var blockLabel=S.pairMode==='cycle'?getCycleLabel(b):'';
    var r=buildWithMode(ac,tempH,blockMode);
    var blockTeams=r.teams;

    for(var i=0;i<blockTeams.length;i++){
      var kk=pk(blockTeams[i].p1,blockTeams[i].p2);
      if(tempH.indexOf(kk)===-1) tempH.push(kk);
      blockTeams[i].id=teamId++;
      blockTeams[i].blockNum=b+1;
      allTeams.push(blockTeams[i]);
    }
    // 동급 대결: bSameLevel이 4명씩 묶어서 팀을 만들므로 인접팀끼리 대결이 자동으로 비슷한 수준
    // 그 외: 기본 순서(랜덤) 유지
    var pairedTeams=blockTeams.slice();
    for(var i=0;i<pairedTeams.length-1;i+=2){
      allMatches.push({id:matchId++,t1:pairedTeams[i].id,t2:pairedTeams[i+1].id,blockNum:b+1});
    }
    blockInfo.push({blockNum:b+1,standby:sb,dup:r.dup,skip:false,modeLabel:blockLabel});
  }
  return{teams:allTeams,matches:allMatches,blockInfo:blockInfo};
}

function mkMatches(ts){
  var all=[],id=0,i,j;
  // 팀 ID → 팀 객체 빠른 조회
  var tmap={};for(i=0;i<ts.length;i++) tmap[ts[i].id]=ts[i];

  for(i=0;i<ts.length;i++)
    for(j=i+1;j<ts.length;j++)
      all.push({id:id++,t1:ts[i].id,t2:ts[j].id,blockNum:0});

  // 혼합 모드: 그룹 간 매치 먼저
  if(S.matchMode==='mixed'){
    all.sort(function(a,b){
      var aMix=(S.groups[a.t1]!==S.groups[a.t2])?1:0;
      var bMix=(S.groups[b.t1]!==S.groups[b.t2])?1:0;
      return bMix-aMix;
    });
  }
  // 게임 수 제한 (모두 랜덤 추출)
  if(S.numGames>0&&S.numGames<all.length){
    if(S.matchMode!=='mixed') all=shuf(all);
    all=all.slice(0,S.numGames);
  }
  for(var k=0;k<all.length;k++) all[k].id=k;
  return all;
}

function generateResultImage(){

  var canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  var KO='"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif';

  // 배경
  ctx.fillStyle='#0d3b2e';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c8f135';ctx.fillRect(0,0,W,4);

  // 타이틀
  ctx.textAlign='center';
  ctx.fillStyle='#c8f135';ctx.font='bold 30px '+KO;
  ctx.fillText('⚡ 피카츄의 배드민턴매치',W/2,44);

  ctx.fillText('라운드 '+S.round+'  ·  총 '+ms.length+'게임',W/2,68);

  // 구분선
  ctx.strokeStyle='rgba(200,241,53,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padX,84);ctx.lineTo(W-padX,84);ctx.stroke();

  // 경기 목록
  var curBlock=-1,y=headerH;
  for(var i=0;i<ms.length;i++){
    var m=ms[i],t1=null,t2=null;
    for(var j=0;j<ts.length;j++){if(ts[j].id===m.t1)t1=ts[j];if(ts[j].id===m.t2)t2=ts[j];}
    var t1win=false,t2win=false;

    // 로테이션 세트 구분
    if(S.matchMode==='rotation'&&m.blockNum!==curBlock){
      curBlock=m.blockNum;
      ctx.fillStyle='rgba(200,241,53,0.1)';
      ctx.fillRect(padX,y,W-padX*2,16);
      ctx.textAlign='center';ctx.fillStyle='#c8f135';ctx.font='bold 11px '+KO;
      ctx.fillText('세트 '+curBlock,W/2,y+12);
      y+=18;
    }

    // 행 배경
    ctx.fillStyle='rgba(255,255,255,0.04)';
    ctx.fillRect(padX,y+3,W-padX*2,rowH-6);

    var midX=W/2;

    // 팀1 (오른쪽 정렬)
    ctx.textAlign='right';
    ctx.fillStyle='#fff';ctx.font='bold 17px '+KO;
    ctx.fillText(t1.p1.name,midX-50,y+rowH/2-5);
    ctx.fillText(t1.p2.name,midX-50,y+rowH/2+15);

    // VS
    ctx.textAlign='center';
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='14px '+KO;

    // 팀2 (왼쪽 정렬)
    ctx.textAlign='left';
    ctx.fillStyle='#fff';ctx.font='bold 17px '+KO;
    ctx.fillText(t2.p1.name,midX+50,y+rowH/2-5);
    ctx.fillText(t2.p2.name,midX+50,y+rowH/2+15);

    // 행 구분선
    ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padX,y+rowH);ctx.lineTo(W-padX,y+rowH);ctx.stroke();
    y+=rowH;
  }

  // 푸터
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.font='12px '+KO;ctx.fillText('피카츄의 배드민턴매치',W/2,H-14);

  canvas.toBlob(function(blob){

    out+='<div class="empty"><div class="empty-icon">👥</div><div class="empty-txt">아직 등록된 회원이 없어요</div><div class="empty-sub">위에서 추가해보세요</div></div>';
  } else {
    out+='<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
        +'<span style="font-weight:700;font-size:14px">전체 회원 '+tag(S.roster.length+'명')+'</span>'
        +'<button class="btn dan" data-a="rclr" style="padding:6px 12px;font-size:12px;min-height:32px">전체 삭제</button>'
      +'</div>';
    for(var i=0;i<S.roster.length;i++){
      var p=S.roster[i];
      if(S.rEditIdx===i){
        // 인라인 수정
        out+='<div class="roster-item editing">'
          +'<div class="roster-num">'+(i+1)+'</div>'
          +'<div class="edit-form">'
            +'<input id="reni" class="inp" style="padding:8px 10px;font-size:13px" value="'+S.rEditName+'" autocomplete="off">'

            +'<div class="g-group" style="gap:4px">'+gBtnsHtml(S.rEditGender,'resg')+'</div>'
            +'<div class="lv-group" style="gap:3px">'+lvBtnsHtml(S.rEditLevel,'resl')+'</div>'
            +'<div style="display:flex;gap:5px">'
              +'<button class="btn pri" data-a="resv" data-i="'+i+'" style="flex:2;padding:7px;font-size:12px;min-height:34px">✓ 저장</button>'
              +'<button class="btn gho" data-a="recx" style="flex:1;padding:7px;font-size:12px;min-height:34px">취소</button>'
            +'</div>'
          +'</div>'
          +'</div>';
      } else {
        out+='<div class="roster-item">'
          +'<div class="roster-num">'+(i+1)+'</div>'
          +'<div class="roster-info">'+gbadge(p.gender)+'<span class="roster-name">'+p.name+'</span>'+lvbadge(p.level)+'</div>'
          +'<div class="roster-actions">'
            +'<button class="icon-btn" data-a="redp" data-i="'+i+'">✏️</button>'
            +'<button class="icon-btn" data-a="rmp" data-i="'+i+'" style="color:var(--red);border-color:rgba(241,85,85,.3)">🗑</button>'
          +'</div>'
          +'</div>';
      }
    }
    out+='</div>';
  }
  return out;
}

// ══════════════════════════════════════════════════════════════════
// 탭 2: 매치 — Step 1 참석자 선택
// ══════════════════════════════════════════════════════════════════
function mStep1Html(){
  if(S.roster.length===0){
    return'<div class="empty"><div class="empty-icon">📋</div>'
      +'<div class="empty-txt">명단이 비어있어요</div>'
      +'<div class="empty-sub">먼저 "명단" 탭에서 회원을 등록해주세요</div></div>'
      +'<button class="btn pri" data-a="gotab" data-v="roster" style="width:100%;margin-top:12px">명단 등록하러 가기 →</button>';
  }
  var selCount=Object.keys(S.selected).filter(function(k){return S.selected[k];}).length;
  var allSelected=selCount===S.roster.length;
  var odd=selCount%2!==0,enough=selCount>=3;

  // 검색어 필터
  var q=(S.attendSearch||'').trim().toLowerCase();
  var filtered=q
    ?S.roster.filter(function(p){return p.name.toLowerCase().indexOf(q)!==-1;})
    :S.roster;

  // 그룹별 인원 집계
  var g1cnt=0,g2cnt=0;
  for(var k in S.selected){if(S.selected[k]){if((S.playerGroups[k]||1)===1)g1cnt++;else g2cnt++;}}

  var gn1=S.groupNames[0],gn2=S.groupNames[1];
  var grpSummary=selCount>0
    ?'<div style="margin-bottom:10px">'
      +'<div style="display:flex;gap:6px;margin-bottom:7px;align-items:center">'
        +'<span style="font-size:11px;color:var(--muted);white-space:nowrap">그룹 이름:</span>'
        +'<input id="gn1" class="inp" value="'+gn1+'" style="flex:1;padding:5px 8px;font-size:12px;font-weight:700;color:#4fc3f7;border-color:#4fc3f750;background:#4fc3f710" placeholder="1그룹">'
        +'<input id="gn2" class="inp" value="'+gn2+'" style="flex:1;padding:5px 8px;font-size:12px;font-weight:700;color:#f48fb1;border-color:#f48fb150;background:#f48fb110" placeholder="2그룹">'
      +'</div>'
      +'<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">'
        +'<span style="padding:3px 9px;border-radius:8px;background:#4fc3f725;border:1px solid #4fc3f750;color:#4fc3f7;font-weight:700;font-size:12px">'+gn1+' '+g1cnt+'명</span>'
        +'<span style="padding:3px 9px;border-radius:8px;background:#f48fb125;border:1px solid #f48fb150;color:#f48fb1;font-weight:700;font-size:12px">'+gn2+' '+g2cnt+'명</span>'
        +'<button data-a="grpall" data-v="1" style="background:transparent;font-size:11px;color:var(--muted);padding:2px 7px;border-radius:6px;border:1px solid var(--border)">전원 '+gn1+'</button>'
        +'<button data-a="grpall" data-v="2" style="background:transparent;font-size:11px;color:var(--muted);padding:2px 7px;border-radius:6px;border:1px solid var(--border)">전원 '+gn2+'</button>'
      +'</div>'
    +'</div>'
    :'';

  var out='<div class="ttl">오늘 참석자</div>'
    +'<div class="sub">참가 인원 선택 · '+gn1+'/'+gn2+' 지정</div>'
    // 검색 입력
    +'<div style="position:relative;margin-bottom:10px">'
      +'<input id="asrch" class="inp" placeholder="🔍 이름 검색..." value="'+(S.attendSearch||'')+'" autocomplete="off" autocorrect="off" style="padding-right:36px">'
      +(q?'<button data-a="srchclr" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;font-size:16px;color:var(--muted);padding:0">×</button>':'')
    +'</div>'
    // 선택 현황 바
    +'<div class="select-bar">'
      +'<span class="select-count">'+selCount+'명 선택됨'+(q?' · 검색 '+filtered.length+'명':'')+'</span>'
      +'<div style="display:flex;gap:6px">'
        +(q?'<button class="select-all-btn" data-a="selfiltered" data-v="on">검색결과 전체선택</button>':'')
        +'<button class="select-all-btn" data-a="selall" data-v="'+(allSelected?'none':'all')+'">'+(allSelected?'전체 해제':'전체 선택')+'</button>'
      +'</div>'
    +'</div>'
    +grpSummary;

  if(filtered.length===0){
    out+='<div style="text-align:center;padding:24px;color:var(--muted);font-size:14px">\''+q+'\' 검색 결과가 없어요</div>';
  } else {
    for(var i=0;i<filtered.length;i++){
      var p=filtered[i],isSel=!!S.selected[p.name];
      var grp=S.playerGroups[p.name]||1;
      var g1ac=grp===1,g2ac=grp===2;
      var g1c='#4fc3f7',g2c='#f48fb1';
      var grpBtns=isSel
        ?'<div style="display:flex;gap:4px;flex-shrink:0">'
          +'<button data-a="pgrp" data-n="'+p.name+'" data-v="1" style="padding:4px 9px;border-radius:8px;font-size:11px;font-weight:800;min-height:28px;border:1px solid '+(g1ac?g1c:'var(--border)')+';background:'+(g1ac?g1c+'28':'transparent')+';color:'+(g1ac?g1c:'var(--muted)')+'">'+gn1+'</button>'
          +'<button data-a="pgrp" data-n="'+p.name+'" data-v="2" style="padding:4px 9px;border-radius:8px;font-size:11px;font-weight:800;min-height:28px;border:1px solid '+(g2ac?g2c:'var(--border)')+';background:'+(g2ac?g2c+'28':'transparent')+';color:'+(g2ac?g2c:'var(--muted)')+'">'+gn2+'</button>'
          +'</div>'
        :'';
      out+='<div class="attend-item'+(isSel?' selected':'')+'" data-a="tog" data-n="'+p.name+'">'
        +'<div class="chk-box'+(isSel?' on':'')+'">'+( isSel?'✓':'')+'</div>'
        +'<div class="attend-info">'
          +'<div class="attend-name">'
            +(q?p.name.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark style="background:rgba(200,241,53,.35);color:var(--white);border-radius:3px;padding:0 2px">$1</mark>'):p.name)
          +'</div>'
          +'<div class="attend-badges">'+gbadge(p.gender)+lvbadge(p.level)
          +(S.round>1&&(S.restCount[p.name]||0)>0?'<span class="badge" style="background:rgba(241,160,53,.2);border:1px solid rgba(241,160,53,.4);color:#f1a035">⏳ '+(S.restCount[p.name])+'회 쉼</span>':'')
          +'</div>'
        +'</div>'
        +grpBtns
        +'</div>';
    }
  }

  if(selCount>=3){
    var stMsg=odd?'⚠️ '+selCount+'명 (홀수) — 1명이 자동 대기 배정돼요':'✅ '+selCount+'명 선택 — '+(selCount/2)+'개 팀 구성 가능';
    out+='<div style="padding:10px 13px;border-radius:10px;margin-top:10px;font-size:13px;'+(odd?'background:rgba(241,160,53,.1);border:1px solid rgba(241,160,53,.3);color:var(--warn)':'background:rgba(100,180,100,.08);border:1px solid rgba(100,180,100,.25);color:var(--lime)')+'">'+stMsg+'</div>';
  }

  out+='<div style="display:flex;justify-content:flex-end;margin-top:14px">'
    +'<button class="btn pri" data-a="mg2" '+(enough?'':'disabled')+'>대진표 생성 →</button>'
    +'</div>';
  return out;
}

// ══════════════════════════════════════════════════════════════════
// 탭 2: 매치 — Step 2 팀 구성
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
// 탭 2: 매치 — Step 2 대진표 (팀구성방식 포함)
// ══════════════════════════════════════════════════════════════════
function mStep2Html(){
  var isRot=S.matchMode==='rotation';

  // ── 팀 구성 방식 버튼 (compact) ──
  var modeBtns='';
  for(var i=0;i<MODES.length;i++){
    var mo=MODES[i],mac=S.pairMode===mo.key;
    modeBtns+='<button class="mbtn '+(mac?'active':'')+'" data-a="sm" data-v="'+mo.key+'" style="min-height:48px;padding:8px 10px">'
      +'<div class="mbtn-lbl" style="font-size:12px">'+mo.lb+'</div>'
      +'<div class="mbtn-desc" style="font-size:10px">'+mo.ds+'</div>'
      +'</button>';
  }

  // ── 대진 방식 버튼 ──
  var mmBtns='';
  var mmList=[
    {key:'roundrobin',lb:'🏆 전체 리그',   ds:'모두 서로 한 번씩'},
    {key:'mixed',     lb:'⚔️ 그룹 혼합',   ds:'그룹 내+간 경기'},
    {key:'rotation',  lb:'🔄 로테이션',     ds:'세트마다 팀 변경'}
  ];
  for(var i=0;i<mmList.length;i++){var mm=mmList[i],ac=S.matchMode===mm.key;mmBtns+='<button class="mbtn '+(ac?'active':'')+'" data-a="mmode" data-v="'+mm.key+'" style="min-height:44px;padding:7px 10px"><div class="mbtn-lbl" style="font-size:11px">'+mm.lb+'</div><div class="mbtn-desc" style="font-size:10px">'+mm.ds+'</div></button>';}

  // ── 게임수 (로테이션도 게임 수로 통일) ──
  var selCnt=Object.keys(S.selected).filter(function(k){return S.selected[k];}).length;
  var gps=Math.floor(selCnt/4); // 세트당 동시 게임 수 (8명=2, 12명=3...)
  var ngv=S.numGames>0?S.numGames:'';
  var rotHint=''; // 로테이션일 때 "= N세트" 안내
  if(isRot&&S.numGames>0&&gps>0){
    var autoSets=Math.ceil(S.numGames/gps);
    rotHint='<span style="font-size:11px;color:var(--muted);white-space:nowrap">= '+autoSets+'세트</span>';
  }
  var countRow='<div style="display:flex;align-items:center;gap:6px">'
    +'<span style="font-size:12px;color:var(--muted);white-space:nowrap">게임 수</span>'
    +'<input id="ngm" class="inp" type="number" min="1" inputmode="numeric" placeholder="'+(isRot?'입력 (기본 '+gps*3+'게임)':'전체')+'" value="'+ngv+'" style="flex:1;padding:8px 10px;font-size:15px">'
    +(isRot?rotHint:'<button class="btn gho" data-a="ngmclr" style="padding:8px 12px;font-size:12px;min-height:40px">전체</button>')
  +'</div>';

  // ── 알림 ──
  var sbNtc=S.standby?ntc('#f1a035','⏳',S.standby.name+' — 이번 라운드 대기 중'):'';
  var dupNtc=S.dup?ntc('var(--red)','⚠️','파트너가 이전 라운드와 겹쳤어요','모든 조합을 이미 사용해서 불가피해요'):'';
  var cycleNtc='';
  if(S.pairMode==='cycle'){
    cycleNtc=ntc('#c8f135','🔁','순환 모드 — 라운드 '+S.round,
      '이번: '+getCycleLabel(S.round-1)+' · 다음: '+getCycleLabel(S.round)+' · 그 다음: '+getCycleLabel(S.round+1));
  }

  // ── 경기 카드 ──
  var mCards='',curBlock=-1;
  for(var i=0;i<S.matches.length;i++){
    var m=S.matches[i],t1=null,t2=null;
    for(var j=0;j<S.teams.length;j++){if(S.teams[j].id===m.t1)t1=S.teams[j];if(S.teams[j].id===m.t2)t2=S.teams[j];}

    if(isRot&&m.blockNum!==curBlock){
      curBlock=m.blockNum;
      var bi=null;for(var bi2=0;bi2<S.blockInfo.length;bi2++)if(S.blockInfo[bi2].blockNum===curBlock){bi=S.blockInfo[bi2];break;}
      var sbLabel=bi&&bi.standby?'<span style="font-size:11px;color:var(--warn)"> · ⏳ '+bi.standby.name+' 대기</span>':'';
      var dupLabel=bi&&bi.dup?'<span style="font-size:11px;color:var(--red)"> · ⚠️ 파트너 겹침</span>':'';
      var modeLabel=bi&&bi.modeLabel?'<span style="font-size:11px;color:var(--muted)"> · '+bi.modeLabel+'</span>':'';
      mCards+='<div style="display:flex;align-items:center;gap:8px;margin:14px 0 8px">'
        +'<div style="flex:1;height:1px;background:var(--border)"></div>'
        +'<span style="font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:1px;color:var(--lime);white-space:nowrap">세트 '+curBlock+sbLabel+dupLabel+modeLabel+'</span>'
        +'<div style="flex:1;height:1px;background:var(--border)"></div>'
        +'</div>';
    }

    var matchTypeBadge='';
    if(S.matchMode==='mixed'){
      var g1=S.groups[m.t1],g2=S.groups[m.t2];
      if(g1!==g2){matchTypeBadge='<span style="font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;background:rgba(200,241,53,.15);border:1px solid rgba(200,241,53,.35);color:var(--lime)">혼합</span>';}
      else{var gc=g1===1?'#4fc3f7':'#f48fb1';matchTypeBadge='<span style="font-size:10px;font-weight:800;padding:1px 6px;border-radius:6px;background:'+gc+'20;border:1px solid '+gc+'40;color:'+gc+'">'+S.groupNames[g1-1]+'</span>';}
    }
    mCards+='<div class="mcard">'
      +'<div class="mbody">'+teamColHtml(t1,false)
        +'<div class="mcenter"><div style="font-size:13px;font-weight:700;color:var(--muted)">VS</div></div>'
        +teamColHtml(t2,true)
      +'</div>'
      +(matchTypeBadge?'<div style="padding:4px 12px 6px;text-align:center">'+matchTypeBadge+'</div>':'')
      +'</div>';
  }

  var hasMatches=S.matches.length>0;

  return'<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">'
      +'<div class="ttl">대진표</div>'
      +(hasMatches?'':'')
    +'</div>'
    // 팀 구성 방식
    +'<div class="lbl" style="margin-bottom:5px">팀 구성 방식</div>'
    +'<div class="mgrid" style="margin-bottom:10px">'+modeBtns+'</div>'
    +cycleNtc
    // 대진 방식
    +'<div class="lbl" style="margin-bottom:5px">대진 방식</div>'
    +'<div class="mgrid" style="margin-bottom:10px;grid-template-columns:1fr 1fr 1fr">'+mmBtns+'</div>'
    // 게임수/세트수
    +'<div style="margin-bottom:14px">'
      +'<div class="lbl" style="margin-bottom:4px">게임 수</div>'
      +countRow
    +'</div>'
    // 대진표 작성 버튼
    +'<button class="btn pri" data-a="genmatches" style="width:100%;margin-bottom:14px;font-size:15px;padding:13px">'
      +(hasMatches?'🔀 다시 섞기':'🏸 대진표 작성')
    +'</button>'
    // 알림
    +sbNtc+dupNtc
    // 매치 있을 때만 표시
    +(hasMatches
      ?'<div style="margin-bottom:14px">'+mCards+'</div>'
       +'<div class="brow" style="margin-bottom:8px">'
         +'<button class="btn suc" data-a="cpr" style="flex:1;font-size:13px">📋 카톡 복사</button>'
         +'<button class="btn gho" data-a="saveimg" style="flex:1;font-size:13px">📸 이미지 저장</button>'
       +'</div>'
       +'<button class="btn pri" data-a="nr" style="width:100%;margin-bottom:8px;font-size:14px;padding:13px">🏸 다음 라운드</button>'
       +'<div class="brow"><button class="btn gho" data-a="mg1" style="flex:1">← 뒤로</button><button class="btn dan" data-a="rst" style="flex:1">🔄 새 매치</button></div>'
      :'<div class="brow"><button class="btn gho" data-a="mg1" style="flex:1">← 뒤로</button></div>'
    );
}

// ══════════════════════════════════════════════════════════════════
// 렌더
// ══════════════════════════════════════════════════════════════════
function render(){
  var themeIcon=S.theme==='dark'?'☀️':'🌙';
  var tabRoster='<button class="tab'+(S.tab==='roster'?' active':'')+'" data-a="gotab" data-v="roster">👥 명단 관리</button>';
  var tabMatch='<button class="tab'+(S.tab==='match'?' active':'')+'" data-a="gotab" data-v="match">🏸 매치 진행</button>';

  var bodyHtml='';
  if(S.tab==='roster'){
    bodyHtml=rosterHtml();
  } else {
    var stepContent='';
    if(S.mStep===1)stepContent=mStep1Html();
    else stepContent=mStep2Html();
    bodyHtml=stepBar()+'<div class="card">'+stepContent+'</div>';
  }

  document.getElementById('app').innerHTML=
    '<div class="wrap">'
    +'<div class="app-header">'
      +'<div style="font-size:32px;line-height:1.2">⚡🏸⚡</div>'
      +'<div class="app-title">피카츄의 배드민턴매치</div>'
      +'<div class="app-sub">동호회 배드민턴 대진표 앱</div>'
      +'<button class="theme-btn" data-a="thm">'+themeIcon+'</button>'
      +'<button class="share-btn" data-a="shr">🔗 공유</button>'
    +'</div>'
    +'<div class="tabs">'+tabRoster+tabMatch+'</div>'
    +'<div class="content">'+bodyHtml+'</div>'
    +'</div>';

  // 포커스
  var ni=document.getElementById('rni');
  if(ni){
    ni.addEventListener('compositionstart',function(){_composing=true;});
    ni.addEventListener('compositionend',function(e){_composing=false;S.rAddName=e.target.value;});
    ni.addEventListener('input',function(e){if(!_composing)S.rAddName=e.target.value;});
    ni.addEventListener('keydown',function(e){if(e.key==='Enter'&&!_composing)act('radd');});
    ni.focus();ni.setSelectionRange(ni.value.length,ni.value.length);
  }
  var reni=document.getElementById('reni');
  if(reni){
    reni.addEventListener('compositionstart',function(){_composing=true;});
    reni.addEventListener('compositionend',function(e){_composing=false;S.rEditName=e.target.value;});
    reni.addEventListener('input',function(e){if(!_composing)S.rEditName=e.target.value;});
    reni.focus();reni.setSelectionRange(reni.value.length,reni.value.length);
  }
  var ngmEl=document.getElementById('ngm');
  if(ngmEl){ngmEl.addEventListener('input',function(e){S.numGames=parseInt(e.target.value)||0;});}
  var asrchEl=document.getElementById('asrch');
  if(asrchEl){
    asrchEl.addEventListener('compositionstart',function(){_composing=true;});
    asrchEl.addEventListener('compositionend',function(e){
      _composing=false;
      S.attendSearch=e.target.value;
      render();
    });
    asrchEl.addEventListener('input',function(e){
      if(!_composing){S.attendSearch=e.target.value;render();}
    });
    if(S.attendSearch){asrchEl.focus();asrchEl.setSelectionRange(asrchEl.value.length,asrchEl.value.length);}
  }
  var gn1el=document.getElementById('gn1'),gn2el=document.getElementById('gn2');
  if(gn1el){gn1el.addEventListener('input',function(e){S.groupNames[0]=e.target.value||'1그룹';lsSave();});}
  if(gn2el){gn2el.addEventListener('input',function(e){S.groupNames[1]=e.target.value||'2그룹';lsSave();});}
}

// ══════════════════════════════════════════════════════════════════
// 액션
// ══════════════════════════════════════════════════════════════════
function act(a,d){
  d=d||{};

  // ── 공통 ──────────────────────────────────────────────────────
  if(a==='gotab'){S.tab=d.v;render();}
  else if(a==='thm'){S.theme=S.theme==='dark'?'light':'dark';document.body.classList.toggle('light',S.theme==='light');lsSave();render();}
  else if(a==='shr'){shareApp();}

  // ── 명단 관리 ─────────────────────────────────────────────────
  else if(a==='rag'){S.rAddGender=d.v;render();}
  else if(a==='ral'){S.rAddLevel=d.v;render();}
  else if(a==='rtgi'){S.rShowGrade=!S.rShowGrade;render();}
  else if(a==='radd'){
    var n=S.rAddName.trim(),dup=false;
    for(var i=0;i<S.roster.length;i++)if(S.roster[i].name===n){dup=true;break;}
    if(!n||dup)return;
    S.roster.push({name:n,gender:S.rAddGender,level:S.rAddLevel});
    S.rAddName='';lsSave();render();
  }
  else if(a==='rmp'){
    var idx=parseInt(d.i);
    delete S.selected[S.roster[idx].name];
    S.roster.splice(idx,1);
    if(S.rEditIdx===idx)S.rEditIdx=-1;
    lsSave();render();
  }
  else if(a==='redp'){var i=parseInt(d.i),p=S.roster[i];S.rEditIdx=i;S.rEditName=p.name;S.rEditGender=p.gender||'남';S.rEditLevel=p.level;render();}
  else if(a==='resg'){S.rEditGender=d.v;render();}
  else if(a==='resl'){S.rEditLevel=d.v;render();}
  else if(a==='resv'){
    var i=parseInt(d.i);
    var reniEl=document.getElementById('reni');
    var newName=reniEl?reniEl.value.trim():S.rEditName.trim();
    if(!newName)return;
    var dup=false;for(var j=0;j<S.roster.length;j++)if(j!==i&&S.roster[j].name===newName){dup=true;break;}
    if(dup){toast('이미 있는 이름이에요');return;}
    var oldName=S.roster[i].name;
    if(S.selected[oldName]){delete S.selected[oldName];S.selected[newName]=true;}
    S.roster[i]={name:newName,gender:S.rEditGender,level:S.rEditLevel};
    S.rEditIdx=-1;lsSave();render();
  }
  else if(a==='recx'){S.rEditIdx=-1;render();}
  else if(a==='rclr'){if(!confirm('전체 명단을 삭제할까요?'))return;S.roster=[];S.selected={};lsSave();render();}

  // ── 참석자 선택 ───────────────────────────────────────────────
  else if(a==='srchclr'){S.attendSearch='';render();}
  else if(a==='selfiltered'){
    var q2=(S.attendSearch||'').trim().toLowerCase();
    S.roster.filter(function(p){return p.name.toLowerCase().indexOf(q2)!==-1;}).forEach(function(p){
      S.selected[p.name]=true;
      if(!S.playerGroups[p.name])S.playerGroups[p.name]=1;
    });
    render();
  }
  else if(a==='tog'){
    var n=d.n;
    S.selected[n]=!S.selected[n];
    if(S.selected[n]&&!S.playerGroups[n]) S.playerGroups[n]=1;
    render();
  }
  else if(a==='pgrp'){S.playerGroups[d.n]=parseInt(d.v);render();}
  else if(a==='grpall'){
    var gv=parseInt(d.v);
    for(var k in S.selected){if(S.selected[k])S.playerGroups[k]=gv;}
    render();
  }
  else if(a==='selall'){
    var all=d.v==='all';
    for(var i=0;i<S.roster.length;i++)S.selected[S.roster[i].name]=all;
    render();
  }

  // ── 매치 흐름 ─────────────────────────────────────────────────
  else if(a==='mg1'){S.mStep=1;render();}
  else if(a==='mg2'){
    S.matches=[];S.teams=[];S.blockInfo=[];S.mStep=2;render();
  }
  else if(a==='sm'){S.pairMode=d.v;render();}
  else if(a==='mmode'){S.matchMode=d.v;render();}
  else if(a==='genmatches'||a==='rsf'){
    doTeams();
    if(S.matchMode==='rotation'){
      var rot=mkRotationSchedule();S.teams=rot.teams;S.matches=rot.matches;S.blockInfo=rot.blockInfo;
    } else {
      S.matches=mkMatches(S.teams);S.blockInfo=[];
    }
    render();
  }
  else if(a==='mg3'){S.mStep=2;render();}
  else if(a==='mg2b'){S.mStep=2;render();}
  else if(a==='lim'){render();}
  else if(a==='ngmclr'){S.numGames=0;render();}
  else if(a==='saveimg'){generateResultImage();}
  else if(a==='cpr'){copyResults();}
  else if(a==='nr'){
    if(S.standby){S.restCount[S.standby.name]=(S.restCount[S.standby.name]||0)+1;}
    for(var i=0;i<S.teams.length;i++){var k=pk(S.teams[i].p1,S.teams[i].p2),found=false;for(var j=0;j<S.history.length;j++)if(S.history[j]===k){found=true;break;}if(!found)S.history.push(k);}
    S.round++;doTeams();
    if(S.matchMode==='rotation'){
      var rot=mkRotationSchedule();S.teams=rot.teams;S.matches=rot.matches;S.blockInfo=rot.blockInfo;
    } else {
      S.matches=mkMatches(S.teams);S.blockInfo=[];
    }
    S.mStep=2;render();
  }
  else if(a==='rst'){
    S.standby=null;S.teams=[];S.matches=[];S.pairMode='random';
    S.history=[];S.round=1;S.dup=false;S.numGames=0;S.matchMode='roundrobin';S.numRotations=3;S.groups={};S.groupNames=['1그룹','2그룹'];S.playerGroups={};S.restCount={};S.blockInfo=[];S.attendSearch='';
    S.mStep=1;render();
  }
}

// ── 클릭 이벤트 ──────────────────────────────────────────────────
document.addEventListener('click',function(e){
  // 가장 가까운 data-a 요소부터 처리 (pgrp 버튼이 tog 보다 우선)
  var el=e.target.closest('[data-a]');
  if(!el||el.disabled)return;
  // pgrp 버튼 클릭 시 부모 attend-item(tog)으로 전파 방지
  if(el.dataset.a==='pgrp'||el.dataset.a==='grpall'){
    e.stopPropagation();
  }
  act(el.dataset.a,el.dataset);
});

// ── 시작 ─────────────────────────────────────────────────────────
lsLoad();
document.body.classList.toggle('light',S.theme==='light');
render();
</script>
