    +'<div class="sub">전체 회원을 미리 등록해두세요</div>'
    +'<div class="lbl">이름</div>'
    +'<input id="rni" class="inp'+(dup?' err':'')+'" placeholder="이름 입력" value="'+S.rAddName+'" autocomplete="off" autocorrect="off" autocapitalize="off">'
    +(dup?'<div class="err-txt">이미 있는 이름이에요</div>':'')
    +'<div style="margin-top:10px;margin-bottom:10px"><div class="lbl">성별</div><div class="g-group">'+gBtnsHtml(S.rAddGender,'rag')+'</div></div>'
    +'<div style="margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span class="lbl" style="margin-bottom:0">등급</span>'+guideBtn+'</div>'
      +'<div class="lv-group">'+lvBtnsHtml(S.rAddLevel,'ral')+'</div>'
      +'<div style="margin-top:7px;padding:9px 11px;border-radius:9px;background:'+curLv.color+'15;border:1px solid '+curLv.color+'35">'
        +'<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">'
          +'<span style="font-weight:800;font-size:13px;color:'+curLv.color+'">'+S.rAddLevel+'등급</span>'
          +'<span style="font-size:12px;font-weight:600;color:var(--white)">'+curInfo.short+'</span>'
        +'</div>'
        +'<div style="font-size:11px;color:var(--muted)">'+curInfo.desc+'</div>'
      +'</div>'
      +(S.rShowGrade?gradeGuideHtml(S.rAddLevel):'')
    +'</div>'
    +'<button class="btn" data-a="radd" style="width:100%;'+addStyle+'" '+(canAdd?'':'disabled')+'>+ 추가</button>'
    +'</div>';

  // 명단 목록
  if(S.roster.length===0){
    out+='<div class="empty"><div class="empty-icon">👥</div><div class="empty-txt">아직 등록된 회원이 없어요</div><div class="empty-sub">위에서 추가해보세요</div></div>';
  } else {
    var rq=(S.rSearch||'').trim().toLowerCase();
    var rFiltered=rq?S.roster.filter(function(p){return p.name.toLowerCase().indexOf(rq)!==-1;}):S.roster;
    var selCnt=Object.keys(S.rSelected).filter(function(k){return S.rSelected[k];}).length;
    var inSel=S.rSelectMode;
    out+='<div class="card">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
        +'<span style="font-weight:700;font-size:14px">전체 회원 '+tag(S.roster.length+'명')+'</span>'
        +'<div style="display:flex;gap:6px">'
          +(inSel&&selCnt>0
            ?'<button class="btn dan" data-a="rdelsel" style="padding:6px 12px;font-size:12px;min-height:32px">🗑 '+selCnt+'명 삭제</button>'
            :'')
          +'<button class="btn gho" data-a="rtogsel" style="padding:6px 12px;font-size:12px;min-height:32px;'+(inSel?'border-color:var(--lime);color:var(--lime)':'')+'">'+( inSel?'✓ 완료':'☑ 선택')+'</button>'
        +'</div>'
      +'</div>'
      // 검색창
      +'<div style="position:relative;margin-bottom:10px">'
        +'<input id="rsrch" class="inp" placeholder="🔍 이름 검색..." value="'+( S.rSearch||'')+'" autocomplete="off" autocorrect="off" style="padding-right:34px">'
        +(rq?'<button data-a="rsrchclr" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;font-size:16px;color:var(--muted);padding:0">×</button>':'')
      +'</div>';
    if(rFiltered.length===0){
      out+='<div id="roster-list-body"><div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">\''+rq+'\' 검색 결과가 없어요</div></div>';
    } else {
    out+='<div id="roster-list-body">';
    for(var i=0;i<rFiltered.length;i++){
      var p=rFiltered[i];
      var origIdx=S.roster.indexOf(p);
      if(S.rEditIdx===origIdx){
        out+='<div class="roster-item editing">'
          +'<div class="roster-num">'+(origIdx+1)+'</div>'
          +'<div class="edit-form">'
            +'<input id="reni" class="inp" style="padding:8px 10px;font-size:13px" value="'+S.rEditName+'" autocomplete="off">'
            +'<div class="g-group" style="gap:4px">'+gBtnsHtml(S.rEditGender,'resg')+'</div>'
            +'<div class="lv-group" style="gap:3px">'+lvBtnsHtml(S.rEditLevel,'resl')+'</div>'
            +'<div style="display:flex;gap:5px">'
              +'<button class="btn pri" data-a="resv" data-i="'+origIdx+'" style="flex:2;padding:7px;font-size:12px;min-height:34px">✓ 저장</button>'
              +'<button class="btn gho" data-a="recx" style="flex:1;padding:7px;font-size:12px;min-height:34px">취소</button>'
            +'</div>'
          +'</div>'
          +'</div>';
      } else {
        var isRSel=!!S.rSelected[p.name];
        out+='<div class="roster-item'+(isRSel?' editing':'')+'" '+(inSel?'data-a="rtogitem" data-n="'+p.name+'"':'')+'>'
          +(inSel
            ?'<div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(isRSel?'var(--lime)':'var(--border)')+';background:'+(isRSel?'var(--lime)':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:13px;color:#0d3b2e;flex-shrink:0">'+(isRSel?'✓':'')+'</div>'
            :'<div class="roster-num">'+(origIdx+1)+'</div>')
          +'<div class="roster-info">'+gbadge(p.gender)
            +(rq?p.name.replace(new RegExp('('+rq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'$1'):('<span class="roster-name">'+p.name+'</span>'))
            +lvbadge(p.level)+'</div>'
          +(!inSel
            ?'<div class="roster-actions">'
              +'<button class="icon-btn" data-a="redp" data-i="'+origIdx+'">✏️</button>'
              +'<button class="icon-btn" data-a="rmp" data-i="'+origIdx+'" style="color:var(--red);border-color:rgba(241,85,85,.3)">🗑</button>'
            +'</div>'
            :'')
          +'</div>';
      }
    }
    }
    out+='</div>'; // roster-list-body
    out+='</div>'; // card
  }
  return out;
}

// ══════════════════════════════════════════════════════════════════
// 탭 2: 매치 — Step 1 참석자 선택
// ══════════════════════════════════════════════════════════════════
function mStep1Html(){
  if(S.roster.length===0){
    return'<div class="empty"><div class="empty-icon">📋</div>'
      +'<div class="empty-txt">명단이 비어있어요</div>'
      +'<div class="empty-sub">먼저 "명단" 탭에서 회원을 등록해주세요</div></div>'
      +'<button class="btn pri" data-a="gotab" data-v="roster" style="width:100%;margin-top:12px">명단 등록하러 가기 →</button>';
  }

  var nc=S.numCourts||1;
  var selCount=Object.keys(S.selected).filter(function(k){return S.selected[k];}).length;
  var allSelected=selCount===S.roster.length;
  var enough=selCount>=3;

  // 검색어 필터
  var q=(S.attendSearch||'').trim().toLowerCase();
  var filtered=q?S.roster.filter(function(p){return p.name.toLowerCase().indexOf(q)!==-1;}):S.roster;

  // 코트별 인원 집계
  var courtCounts={};
  for(var ci=1;ci<=nc;ci++) courtCounts[ci]=0;
  var lateCount=0;
  for(var k in S.selected){
    if(!S.selected[k]) continue;
    if(S.lateArrivals[k]){lateCount++;continue;}
    var c=S.playerGroups[k]||1;
    courtCounts[c]=(courtCounts[c]||0)+1;
  }
  var earlyCount=selCount-lateCount;

  // ── 코트 수 선택 ──
  var courtNumBtns='';
  for(var ci=1;ci<=6;ci++){
    var isAc=nc===ci;
    courtNumBtns+='<button data-a="setnc" data-v="'+ci+'" style="flex:1;padding:8px 0;border-radius:8px;font-weight:700;font-size:13px;min-height:36px;border:1px solid '+(isAc?'var(--lime)':'var(--border)')+';background:'+(isAc?'var(--tab-active)':'transparent')+';color:'+(isAc?'var(--lime)':'var(--muted)')+'">'+ci+'</button>';
  }

  // ── 코트별 현황 요약 ──
  var courtSummary='';
  if(selCount>0){
    courtSummary='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center">';
    // 실제 배정된 코트만 표시 (nc=0이어도 보임)
    var shownCourts=Math.max(nc,1);
    for(var ci=1;ci<=shownCourts;ci++){
      var cc=COURT_COLORS[(ci-1)%COURT_COLORS.length];
      courtSummary+='<span style="padding:3px 9px;border-radius:8px;background:'+cc+'22;border:1px solid '+cc+'44;color:'+cc+';font-weight:700;font-size:12px">'+ci+'코트 '+(courtCounts[ci]||0)+'명</span>';
    }
    if(lateCount>0) courtSummary+='<span style="padding:3px 9px;border-radius:8px;background:rgba(241,160,53,.18);border:1px solid rgba(241,160,53,.4);color:#f1a035;font-weight:700;font-size:12px">🕐 늦참 '+lateCount+'명</span>';
    if(shownCourts>1){
      courtSummary+='<div style="display:flex;gap:3px;margin-left:auto">';
      for(var ci=1;ci<=shownCourts;ci++){
        var cc=COURT_COLORS[(ci-1)%COURT_COLORS.length];
        courtSummary+='<button data-a="courtall" data-v="'+ci+'" style="padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid '+cc+'44;background:'+cc+'18;color:'+cc+'">전원 '+ci+'코트</button>';
      }
      courtSummary+='</div>';
    }
    courtSummary+='</div>';
  }

  var out='<div class="ttl">오늘 참석자</div>'
    // ── 코트·게임 설정 카드 ──
    +'<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px">'
      +'<div style="display:flex;gap:10px">'
        // 코트 수
        +'<div style="flex:1">'
          +'<div class="lbl" style="margin-bottom:5px">🏟️ 코트 수</div>'
          +'<input id="inp-nc" class="inp" type="number" min="1" max="10" inputmode="numeric" placeholder="코트 수 입력" value="'+(S.numCourts>0?S.numCourts:'')+'" style="padding:10px;font-size:18px;font-weight:700;text-align:center">'
        +'</div>'
        // 게임 수
        +'<div style="flex:2">'
          +'<div class="lbl" style="margin-bottom:5px">🎮 게임 수</div>'
          +'<input id="inp-ng" class="inp" type="number" min="1" inputmode="numeric" placeholder="게임(세트) 수 입력" value="'+(S.numGames>0?S.numGames:'')+'" style="padding:10px;font-size:18px;font-weight:700;text-align:center">'
        +'</div>'
      +'</div>'
    +'</div>'
    // 검색
    +'<div style="position:relative;margin-bottom:10px">'
      +'<input id="asrch" class="inp" placeholder="🔍 이름 검색..." value="'+(S.attendSearch||'')+'" autocomplete="off" autocorrect="off" style="padding-right:36px">'
      +(q?'<button data-a="srchclr" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:transparent;font-size:16px;color:var(--muted);padding:0">×</button>':'')
    +'</div>'
    // 선택 현황
    +'<div class="select-bar" style="margin-bottom:8px">'
      +'<span class="select-count">'+selCount+'명 선택됨'+(q?' · 검색 '+filtered.length+'명':'')+'</span>'
      +'<div style="display:flex;gap:6px">'
        +(q?'<button class="select-all-btn" data-a="selfiltered">검색결과 전체선택</button>':'')
        +'<button class="select-all-btn" data-a="selall" data-v="'+(allSelected?'none':'all')+'">'+(allSelected?'전체 해제':'전체 선택')+'</button>'
        +'<button class="select-all-btn" data-a="toggleGuide" style="background:transparent;border-color:'+(S.showGuide?'var(--lime)':'var(--border)')+';color:'+(S.showGuide?'var(--lime)':'var(--muted)')+'">사용방법</button>'
      +'</div>'
    +'</div>'
    +(S.showGuide
      ?'<div style="background:var(--card);border:1px solid rgba(200,241,53,.3);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:12px;color:var(--muted);line-height:1.9">'
        +'<b style="color:var(--lime)">📖 사용방법</b><br>'
        +'<b style="color:var(--white)">1.</b> 코트 수 / 게임 수 입력<br>'
        +'<b style="color:var(--white)">2.</b> 코트 버튼 눌러 참석·배정 (늦참은 🕐)<br>'
        +'<b style="color:var(--white)">3.</b> 대진표 생성 → 팀 구성 방식 선택<br>'
        +'<b style="color:var(--white)">4.</b> ▶ 진행 중 → ✓ 완료 순서로 클릭<br>'
        +'<b style="color:var(--white)">5.</b> 늦참 도착 시 대진표에서 ✅ 도착! 클릭<br>'
        +'<br>'
        +'<b style="color:var(--lime)">🏸 팀 구성 방식</b><br>'
        +'<b style="color:var(--white)">🎲 랜덤</b> — 그냥 무작위로 팀 구성<br>'
        +'<b style="color:var(--white)">🤝 밸런스 매치</b> — 양 팀 실력 합 비슷하게<br>'
        +'<b style="color:var(--white)">🎯 수준별(좁게)</b> — 딱 비슷한 등급끼리<br>'
        +'<b style="color:var(--white)">🎺 수준별(넓게)</b> — 인접 등급도 섞여 멤버 다양<br>'
        +'<b style="color:var(--white)">🔥 빡겜 매치</b> — 잘 치는 사람끼리 (밸런스 팀)<br>'
        +'<b style="color:var(--white)">🔁 순환</b> — 3세트 주기로 자동 변경 (수준별은 좁게↔넓게 번갈아)'
      +'</div>'
      :'')
    +courtSummary;

  // ── 참석자 목록 ──
  out+='<div id="attend-list-body">';
  if(filtered.length===0){
    out+='<div style="text-align:center;padding:24px;color:var(--muted);font-size:14px">\''+q+'\' 검색 결과가 없어요</div>';
  } else {
    for(var i=0;i<filtered.length;i++){
      var p=filtered[i],isSel=!!S.selected[p.name];
      var isLate=!!S.lateArrivals[p.name];
      var pCourt=S.playerGroups[p.name]||1;
      var pc=COURT_COLORS[(pCourt-1)%COURT_COLORS.length];

      // 코트 버튼 (항상 표시, 클릭하면 참석+배정 동시)
      var courtBtns='<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0;align-items:flex-end">';
      var courtRow='<div style="display:flex;gap:2px">';
      for(var ci=1;ci<=nc;ci++){
        var cc=COURT_COLORS[(ci-1)%COURT_COLORS.length];
        var isAc=isSel&&!isLate&&pCourt===ci;
        var cnt=courtCounts[ci]||0;
        courtRow+='<button data-a="courtSelect" data-n="'+p.name+'" data-v="'+ci+'" style="padding:3px 7px;border-radius:6px;font-size:10px;font-weight:800;min-height:26px;border:1px solid '+(isAc?cc:'var(--border)')+';background:'+(isAc?cc+'28':'transparent')+';color:'+(isAc?cc:'var(--muted)')+'">'+ci+'코트<span style="font-size:9px;opacity:.7">('+cnt+')</span></button>';
      }
      courtRow+='</div>';
      var lateBtn=isSel?'<button data-a="togglelate" data-n="'+p.name+'" style="padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;min-height:20px;border:1px solid '+(isLate?'rgba(241,160,53,.5)':'var(--border)')+';background:'+(isLate?'rgba(241,160,53,.2)':'transparent')+';color:'+(isLate?'#f1a035':'var(--muted)')+'">'+(isLate?'🕐 늦참':'늦참')+'</button>':'';
      courtBtns+=courtRow+lateBtn+'</div>';

      var leftBorderColor=isSel?(isLate?'rgba(241,160,53,.5)':pc+'88'):'transparent';
      out+='<div class="attend-item'+(isSel?' selected':'')+' " style="border-left:3px solid '+leftBorderColor+';padding-left:10px;'+(isLate?'border-color:rgba(241,160,53,.35);background:rgba(241,160,53,.06);':'')+'">'
        +'<div class="chk-box'+(isSel?' on':'')+'">'+( isSel?'✓':'')+'</div>'
        +'<div class="attend-info">'
          +'<div class="attend-name">'
            +(q?p.name.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'$1'):p.name)
            +(isSel?'<span style="font-size:10px;font-weight:700;color:'+pc+';margin-left:5px">'+pCourt+'코트</span>':'')
            +(isLate?'<span style="font-size:10px;font-weight:700;color:#f1a035;margin-left:4px">🕐 늦참</span>':'')
          +'</div>'
          +'<div class="attend-badges">'+gbadge(p.gender)+lvbadge(p.level)
          +(S.round>1&&(S.restCount[p.name]||0)>0?'<span class="badge" style="background:rgba(241,160,53,.2);border:1px solid rgba(241,160,53,.4);color:#f1a035">⏳ '+(S.restCount[p.name])+'회 쉼</span>':'')
          +'</div>'
        +'</div>'
        +courtBtns
        +'</div>';
    }
  }
  out+='</div>'; // attend-list-body

  // 요약 + 늦참 반영 버튼
  if(selCount>=3){
    var msg='✅ '+earlyCount+'명 선착'+(lateCount?' + 🕐 '+lateCount+'명 늦참':'');
    out+='<div style="padding:10px 13px;border-radius:10px;margin-top:10px;font-size:13px;background:rgba(100,180,100,.08);border:1px solid rgba(100,180,100,.25);color:var(--lime)">'+msg+'</div>';
  }

  // 늦참 반영 버튼 (대진표가 있고 늦참자가 있을 때)
  if(lateCount>0&&S.matches.length>0){
    out+='<button class="btn" data-a="applylate" style="width:100%;margin-top:10px;background:rgba(241,160,53,.18);border:1px solid rgba(241,160,53,.4);color:#f1a035;font-size:14px;padding:12px">🕐 늦참 반영하기 ('+lateCount+'명 합류)</button>';
  }

  out+='<div style="display:flex;justify-content:flex-end;margin-top:12px">'
    +'<button class="btn pri" data-a="mg2" '+(enough?'':'disabled')+'>대진표 생성 →</button>'
    +'</div>';
  return out;
}

// ══════════════════════════════════════════════════════════════════
// 탭 2: 매치 — Step 2 팀 구성
// ══════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════
// 탭 2: 매치 — Step 2 대진표 (팀구성방식 포함)
// ══════════════════════════════════════════════════════════════════
function mStep2Html(){
  var isRot=S.matchMode==='rotation';

  // ── 팀 구성 방식 버튼 (compact) ──
  var modeBtns='';
  for(var i=0;i<MODES.length;i++){
    var mo=MODES[i],mac=S.pairMode===mo.key;
    var fullWidth=mo.key==='cycle'?'grid-column:1/-1;':'';
    modeBtns+='<button class="mbtn '+(mac?'active':'')+'" data-a="sm" data-v="'+mo.key+'" style="min-height:48px;padding:8px 10px;'+fullWidth+'">'
      +'<div class="mbtn-lbl" style="font-size:12px">'+mo.lb+'</div>'
      +'<div class="mbtn-desc" style="font-size:10px">'+mo.ds+'</div>'
      +'</button>';
  }

  // ── 게임수 ──
  var selCnt=Object.keys(S.selected).filter(function(k){return S.selected[k];}).length;
  var gps=Math.floor(selCnt/4); // 세트당 동시 게임 수 (8명=2, 12명=3...)
  var ngv=S.numGames>0?S.numGames:'';
  var rotHint=''; // 로테이션일 때 "= N세트" 안내
  if(isRot&&S.numGames>0&&gps>0){
    var autoSets=Math.ceil(S.numGames/Math.min(S.numCourts,gps||1));
    rotHint='<span style="font-size:11px;color:var(--muted);white-space:nowrap">= '+autoSets+'세트</span>';
  }
  var countRow='<div style="display:flex;gap:8px;align-items:flex-end">'
    +'<div style="flex:2">'
      +'<div class="lbl" style="margin-bottom:4px">게임 수</div>'
      +'<div style="display:flex;align-items:center;gap:6px">'
        +'<input id="ngm" class="inp" type="number" min="1" inputmode="numeric" placeholder="기본 4게임" value="'+ngv+'" style="flex:1;padding:8px 10px;font-size:15px">'
        +(isRot?rotHint:'')
      +'</div>'
    +'</div>'
    +'<div style="flex:1">'
      +'<div class="lbl" style="margin-bottom:4px">코트 수</div>'
      +'<input id="nct" class="inp" type="number" min="1" max="10" inputmode="numeric" placeholder="1" value="'+(S.numCourts||1)+'" style="padding:8px 10px;font-size:15px;width:100%">'
    +'</div>'
  +'</div>';

  // ── 그룹 매치 방식 (참석자에 두 그룹이 있을 때만 표시) ──
  var g1cnt=0,g2cnt=0;
  for(var k in S.selected){if(S.selected[k]){if((S.playerGroups[k]||1)===1)g1cnt++;else g2cnt++;}}
  var showGroupMode=g1cnt>=2&&g2cnt>=2;
  var groupModeHtml='';
  if(showGroupMode){
    var gn1=S.groupNames[0],gn2=S.groupNames[1];
    var isIntra=S.groupMode!=='any';
    groupModeHtml='<div class="lbl" style="margin-bottom:5px">코트 매치 방식</div>'
      +'<div style="display:flex;gap:6px;margin-bottom:14px">'
        +'<button data-a="setgm" data-v="any" style="flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:13px;min-height:44px;border:1px solid '+(!isIntra?'var(--lime)':'var(--border)')+';background:'+(!isIntra?'var(--tab-active)':'var(--card)')+';color:'+(!isIntra?'var(--lime)':'var(--muted)')+'">전체 혼합<br><span style="font-size:10px;font-weight:400">모두 골고루 (추천)</span></button>'
        +'<button data-a="setgm" data-v="intra" style="flex:1;padding:10px;border-radius:10px;font-weight:700;font-size:13px;min-height:44px;border:1px solid '+(isIntra?'var(--lime)':'var(--border)')+';background:'+(isIntra?'var(--tab-active)':'var(--card)')+';color:'+(isIntra?'var(--lime)':'var(--muted)')+'">코트 분리<br><span style="font-size:10px;font-weight:400">각 코트끼리만</span></button>'
      +'</div>';
  }
  var sbNtc='';
  var dupNtc=S.dup?ntc('var(--red)','⚠️','파트너가 이전 라운드와 겹쳤어요','모든 조합을 이미 사용해서 불가피해요'):'';
  var cycleNtc='';
  if(S.pairMode==='cycle'){
    cycleNtc=ntc('#c8f135','🔁','순환 모드 (3세트 주기)',
      '랜덤 → 밸런스 → 수준별 반복 (수준별은 좁게↔넓게 번갈아)');
  }

  // ── 경기 카드 — 세트별, 코트 가로 배치 ──
  var mCards='';
  // 세트별로 매치 그룹핑
  var setsMap={},blockOrder=[];
  for(var i=0;i<S.matches.length;i++){
    var m=S.matches[i],t1x=null,t2x=null;
    for(var j=0;j<S.teams.length;j++){if(S.teams[j].id===m.t1)t1x=S.teams[j];if(S.teams[j].id===m.t2)t2x=S.teams[j];}
    if(!t1x||!t2x) continue;
    if(t1x.grp&&t2x.grp&&t1x.grp!==t2x.grp) continue;
    var cid=(t1x.grp)||m.court||1;
    var bn=m.blockNum||0;
    if(!setsMap[bn]){setsMap[bn]={};blockOrder.push(bn);}
    if(!setsMap[bn][cid]) setsMap[bn][cid]=[];
    setsMap[bn][cid].push({m:m,t1:t1x,t2:t2x});
  }

  for(var si=0;si<blockOrder.length;si++){
    var bn=blockOrder[si];
    var setData=setsMap[bn];
    var courtIds=Object.keys(setData).sort(function(a,b){return a-b;});
    var ncols=courtIds.length;

    // 세트 구분선
    var biObj=null;for(var bi2=0;bi2<S.blockInfo.length;bi2++)if(S.blockInfo[bi2].blockNum===bn){biObj=S.blockInfo[bi2];break;}
    var sbLabel='';
    var dupLabel=biObj&&biObj.dup?'<span style="font-size:11px;color:var(--red)"> · ⚠️</span>':'';
    var mLabel=biObj&&biObj.modeLabel?'<span style="font-size:11px;color:var(--muted)"> · '+biObj.modeLabel+'</span>':'';
    mCards+='<div class="set-divider"><div class="set-divider-line"></div>'
      +'<span class="set-divider-label">세트 '+bn+sbLabel+dupLabel+mLabel+'</span>'
      +'<div class="set-divider-line"></div></div>';

    // 코트 가로 배치 (화면 너비가 코트 수에 맞춰 넓어지므로 grid로 균등 배치)
    mCards+='<div style="display:grid;grid-template-columns:repeat('+ncols+',1fr);gap:8px;margin-bottom:4px">';
    for(var ci=0;ci<courtIds.length;ci++){
      var cid=parseInt(courtIds[ci]);
      var cc=COURT_COLORS[(cid-1)%COURT_COLORS.length];
      var courtMs=setData[courtIds[ci]];
      mCards+='<div>';
      // 코트 헤더 (2개 이상일 때)
      if(ncols>1){
        mCards+='<div style="text-align:center;padding:3px;border-radius:8px 8px 0 0;background:'+cc+'22;border:1px solid '+cc+'44;border-bottom:none;font-size:11px;font-weight:800;color:'+cc+'">'+cid+'코트</div>';
      }
      for(var mi=0;mi<courtMs.length;mi++){
        var mObj=courtMs[mi],mt=mObj.m,mt1=mObj.t1,mt2=mObj.t2;
        var isDone=!!mt.done,isIP=!!mt.inProgress;
        var statusRow='';
        if(isDone){
          statusRow='<div style="border-top:1px solid var(--border);padding:4px 8px;display:flex;justify-content:space-between;align-items:center">'
            +'<span style="font-size:10px;color:var(--muted)">✓ 완료</span>'
            +'<button data-a="delMatch" data-id="'+mt.id+'" style="font-size:10px;color:var(--red);background:transparent;padding:1px 6px;border:1px solid rgba(241,85,85,.3);border-radius:5px">🗑 삭제</button>'
            +'</div>';
        } else if(isIP){
          statusRow='<div style="border-top:1px solid var(--border);padding:4px 8px;display:flex;justify-content:space-between;align-items:center">'
            +'<span style="font-size:10px;font-weight:700;color:'+cc+'">🏸 진행 중</span>'
            +'<button data-a="doneMatch" data-id="'+mt.id+'" style="font-size:10px;color:var(--lime);background:transparent;padding:1px 6px;border:1px solid rgba(200,241,53,.3);border-radius:5px">✓ 완료</button>'
            +'</div>';
        } else {
          statusRow='<div style="border-top:1px solid var(--border);padding:4px 8px;display:flex;justify-content:space-between">'
            +'<button data-a="ipMatch" data-id="'+mt.id+'" style="font-size:10px;color:var(--muted);background:transparent;padding:1px 6px;border:1px solid var(--border);border-radius:5px">▶ 진행 중</button>'
            +'<button data-a="doneMatch" data-id="'+mt.id+'" style="font-size:10px;color:var(--muted);background:transparent;padding:1px 6px;border:1px solid var(--border);border-radius:5px">✓ 완료</button>'
            +'</div>';
        }
        mCards+='<div class="mcard" style="border-left:3px solid '+(isDone?'rgba(255,255,255,.1)':cc)+';margin-bottom:6px;opacity:'+(isDone?'.4':'1')+'">'
          +'<div class="mbody" style="padding:10px 10px 6px">'
            +'<div class="mteam"><div class="mname" style="font-size:13px">'+mt1.p1.name+'</div><div class="mname" style="font-size:13px">'+mt1.p2.name+'</div></div>'
            +'<div class="mcenter"><div style="font-size:11px;font-weight:700;color:'+(isIP?cc:'var(--muted)')+'">VS</div></div>'
            +'<div class="mteam r"><div class="mname" style="font-size:13px">'+mt2.p1.name+'</div><div class="mname" style="font-size:13px">'+mt2.p2.name+'</div></div>'
          +'</div>'
          +statusRow
          +'</div>';
      }
      mCards+='</div>';
    }
    mCards+='</div>';
  }

  // ── 늦참 패널 ──
  var latePanel='';
  var lateNames=Object.keys(S.lateArrivals).filter(function(k){return S.selected[k]&&S.lateArrivals[k];});
  if(lateNames.length>0){
    latePanel='<div style="background:rgba(241,160,53,.08);border:1px solid rgba(241,160,53,.3);border-radius:12px;padding:12px;margin-bottom:14px">'
      +'<div style="font-weight:700;font-size:13px;color:#f1a035;margin-bottom:8px">🕐 늦참 대기 중</div>';
    for(var li=0;li<lateNames.length;li++){
      var ln=lateNames[li];
      var lc=S.playerGroups[ln]||1;
      var lcc=COURT_COLORS[(lc-1)%COURT_COLORS.length];
      latePanel+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(241,160,53,.15)">'
        +'<div>'
          +'<span style="font-weight:700;font-size:14px;color:var(--white)">'+ln+'</span>'
          +'<span style="font-size:11px;font-weight:700;color:'+lcc+';margin-left:6px">'+lc+'코트</span>'
        +'</div>'
        +'<button data-a="arriveLate" data-n="'+ln+'" style="padding:5px 14px;border-radius:8px;font-weight:700;font-size:12px;min-height:30px;background:rgba(241,160,53,.2);border:1px solid rgba(241,160,53,.5);color:#f1a035">✅ 도착!</button>'
      +'</div>';
    }
    latePanel+='</div>';
  }
  var latePanelHtml=latePanel;

  var hasMatches=S.matches.length>0;

  // 늦참 패널
  var lateArrivalsPanel='';
  var lateNames2=Object.keys(S.lateArrivals).filter(function(k){return S.selected[k];});
  if(lateNames2.length>0){
    lateArrivalsPanel='<div style="background:rgba(241,160,53,.08);border:1px solid rgba(241,160,53,.3);border-radius:12px;padding:12px;margin-bottom:14px">'
      +'<div style="font-weight:700;font-size:13px;color:#f1a035;margin-bottom:8px">🕐 늦참 대기 중 — 도착하면 눌러주세요</div>';
    for(var li=0;li<lateNames2.length;li++){
      var ln2=lateNames2[li];
      var lc2=S.playerGroups[ln2]||1;
      var lcc2=COURT_COLORS[(lc2-1)%COURT_COLORS.length];
      lateArrivalsPanel+='<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(241,160,53,.12)">'
        +'<div style="display:flex;align-items:center;gap:8px">'
          +'<span style="font-weight:700;font-size:15px;color:var(--white)">'+ln2+'</span>'
          +'<span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:6px;background:'+lcc2+'22;border:1px solid '+lcc2+'44;color:'+lcc2+'">'+lc2+'코트</span>'
        +'</div>'
        +'<button data-a="arriveLate" data-n="'+ln2+'" style="padding:7px 16px;border-radius:9px;font-weight:700;font-size:13px;background:rgba(200,241,53,.15);border:1px solid rgba(200,241,53,.4);color:var(--lime)">✅ 도착!</button>'
      +'</div>';
    }
    lateArrivalsPanel+='</div>';
  }

  return'<div class="ttl" style="margin-bottom:10px">대진표</div>'
    +'<div class="lbl" style="margin-bottom:5px">팀 구성 방식</div>'
    +'<div class="mgrid" style="margin-bottom:10px">'+modeBtns+'</div>'
    +cycleNtc
    +groupModeHtml
    +'<button class="btn pri" data-a="genmatches" style="width:100%;margin-bottom:12px;font-size:15px;padding:13px">🏸 대진표 작성</button>'
    +(hasMatches
      ?'<div class="brow" style="margin-bottom:12px">'
         +'<button class="btn suc" data-a="cpr" style="flex:1;font-size:13px">📋 카톡 복사</button>'
         +'<button class="btn gho" data-a="saveimg" style="flex:1;font-size:13px">🖼️ 이미지 저장</button>'
         +'<button class="btn gho" onclick="printSchedule()" style="flex:1;font-size:13px">🖨️ 인쇄</button>'
       +'</div>'
      :'')
    +'<div class="brow" style="margin-bottom:16px">'
      +'<button class="btn gho" data-a="mg1" style="flex:1">← 뒤로</button>'
    +'</div>'
    // 늦참 패널 (있을 때만)
    +lateArrivalsPanel
    +sbNtc+dupNtc
    +(hasMatches?'<div style="margin-bottom:14px">'+mCards+'</div>':'');
}

// ══════════════════════════════════════════════════════════════════
// 렌더
// ══════════════════════════════════════════════════════════════════
// 명단 목록만 부분 업데이트 (검색 시 포커스 유지)
// 참석자 목록만 부분 업데이트 (검색 시 포커스 유지)
function renderAttendList(){
  var listEl=document.getElementById('attend-list-body');
  if(!listEl){render();return;}
  var nc=Math.max(1,S.numCourts||1);
  var q=(S.attendSearch||'').trim().toLowerCase();
  var filtered=q?S.roster.filter(function(p){return p.name.toLowerCase().indexOf(q)!==-1;}):S.roster;
  var courtCounts={};
  for(var ci=1;ci<=nc;ci++) courtCounts[ci]=0;
  var lateCount=0;
  for(var k in S.selected){
    if(!S.selected[k]) continue;
    if(S.lateArrivals[k]){lateCount++;continue;}
    var c=S.playerGroups[k]||1;
    courtCounts[c]=(courtCounts[c]||0)+1;
  }

  var html='';
  if(filtered.length===0){
    html='<div style="text-align:center;padding:24px;color:var(--muted);font-size:14px">\''+q+'\' 검색 결과가 없어요</div>';
  } else {
    for(var i=0;i<filtered.length;i++){
      var p=filtered[i],isSel=!!S.selected[p.name];
      var isLate=!!S.lateArrivals[p.name];
      var pCourt=S.playerGroups[p.name]||1;
      var pc=COURT_COLORS[(pCourt-1)%COURT_COLORS.length];
      var courtBtns='<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0;align-items:flex-end">';
      var courtRow='<div style="display:flex;gap:2px">';
      for(var ci=1;ci<=nc;ci++){
        var cc=COURT_COLORS[(ci-1)%COURT_COLORS.length];
        var isAc=isSel&&pCourt===ci;
        var cnt=courtCounts[ci]||0;
        courtRow+='<button data-a="courtSelect" data-n="'+p.name+'" data-v="'+ci+'" style="padding:3px 7px;border-radius:6px;font-size:10px;font-weight:800;min-height:26px;border:1px solid '+(isAc?cc:'var(--border)')+';background:'+(isAc?cc+'28':'transparent')+';color:'+(isAc?cc:'var(--muted)')+'">'+ci+'코트<span style="font-size:9px;opacity:.7">('+cnt+')</span></button>';
      }
      courtRow+='</div>';
      var lateBtn=isSel?'<button data-a="togglelate" data-n="'+p.name+'" style="padding:1px 7px;border-radius:6px;font-size:10px;font-weight:700;min-height:20px;border:1px solid '+(isLate?'rgba(241,160,53,.5)':'var(--border)')+';background:'+(isLate?'rgba(241,160,53,.2)':'transparent')+';color:'+(isLate?'#f1a035':'var(--muted)')+'">'+(isLate?'🕐 늦참':'늦참')+'</button>':'';
      courtBtns+=courtRow+lateBtn+'</div>';
      var leftBorderColor=isSel?(isLate?'rgba(241,160,53,.5)':pc+'88'):'transparent';
      html+='<div class="attend-item'+(isSel?' selected':'')+'" style="border-left:3px solid '+leftBorderColor+';padding-left:10px;'+(isLate?'border-color:rgba(241,160,53,.35);background:rgba(241,160,53,.06);':'')+'">'
        +'<div class="chk-box'+(isSel?' on':'')+'">'+( isSel?'✓':'')+'</div>'
        +'<div class="attend-info">'
          +'<div class="attend-name">'+p.name
            +(isSel?'<span style="font-size:10px;font-weight:700;color:'+pc+';margin-left:5px">'+pCourt+'코트</span>':'')
            +(isLate?'<span style="font-size:10px;font-weight:700;color:#f1a035;margin-left:4px">🕐 늦참</span>':'')
          +'</div>'
          +'<div class="attend-badges">'+gbadge(p.gender)+lvbadge(p.level)+'</div>'
        +'</div>'
        +courtBtns
        +'</div>';
    }
  }
  listEl.innerHTML=html;
}

function renderRosterList(){
  var listEl=document.getElementById('roster-list-body');
  if(!listEl){render();return;} // 없으면 전체 렌더
  var rq=(S.rSearch||'').trim().toLowerCase();
  var rFiltered=rq?S.roster.filter(function(p){return p.name.toLowerCase().indexOf(rq)!==-1;}):S.roster;
  var inSel=S.rSelectMode;
  var html='';
  if(rFiltered.length===0){
    html='<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">\''+rq+'\' 검색 결과가 없어요</div>';
  } else {
    for(var i=0;i<rFiltered.length;i++){
      var p=rFiltered[i];
      var origIdx=S.roster.indexOf(p);
      var isRSel=!!S.rSelected[p.name];
      html+='<div class="roster-item'+(isRSel?' editing':'')+'" '+(inSel?'data-a="rtogitem" data-n="'+p.name+'"':'')+'>'
        +(inSel
          ?'<div style="width:22px;height:22px;border-radius:6px;border:2px solid '+(isRSel?'var(--lime)':'var(--border)')+';background:'+(isRSel?'var(--lime)':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:13px;color:#0d3b2e;flex-shrink:0">'+(isRSel?'✓':'')+'</div>'
          :'<div class="roster-num">'+(origIdx+1)+'</div>')
        +'<div class="roster-info">'+gbadge(p.gender)
          +(rq?p.name.replace(new RegExp('('+rq.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'$1'):('<span class="roster-name">'+p.name+'</span>'))
          +lvbadge(p.level)+'</div>'
        +(!inSel
          ?'<div class="roster-actions">'
            +'<button class="icon-btn" data-a="redp" data-i="'+origIdx+'">✏️</button>'
            +'<button class="icon-btn" data-a="rmp" data-i="'+origIdx+'" style="color:var(--red);border-color:rgba(241,85,85,.3)">🗑</button>'
          +'</div>'
          :'')
        +'</div>';
    }
  }
  listEl.innerHTML=html;
}

function render(){
  var themeIcon=S.theme==='dark'?'☀️':'🌙';
  var tabRoster='<button class="tab'+(S.tab==='roster'?' active':'')+'" data-a="gotab" data-v="roster">👥 명단 관리</button>';
  var tabMatch='<button class="tab'+(S.tab==='match'?' active':'')+'" data-a="gotab" data-v="match">🏸 매치 진행</button>';

  var bodyHtml='';
  if(S.tab==='roster'){
    bodyHtml=rosterHtml();
  } else {
    var stepContent='';
    if(S.mStep===1)stepContent=mStep1Html();
    else stepContent=mStep2Html();
    bodyHtml=stepBar()+'<div class="card">'+stepContent+'</div>';
  }

  // 매치 2단계에서 코트가 많으면 화면 너비 넓히기
  var wrapWidth=480;
  if(S.tab==='match'&&S.mStep===2){
    var courtCount=parseInt(S.numCourts)||1;
    if(courtCount>=4) wrapWidth=860;
    else if(courtCount===3) wrapWidth=680;
  }

  document.getElementById('app').innerHTML=
    '<div class="wrap" style="max-width:'+wrapWidth+'px">'
    +'<div class="app-header">'
      +'<div style="font-size:32px;line-height:1.2">⚡🏸⚡</div>'
      +'<div class="app-title">피카츄의 배드민턴매치</div>'
      +'<div class="app-sub">동호회 배드민턴 대진표 앱</div>'
      +'<button class="theme-btn" data-a="thm">'+themeIcon+'</button>'
    +'</div>'
    +'<div class="tabs">'+tabRoster+tabMatch+'</div>'
    +'<div class="content">'+bodyHtml+'</div>'
    +'</div>';

  // 포커스
  var ni=document.getElementById('rni');
  if(ni){
    ni.addEventListener('compositionstart',function(){_composing=true;});
    ni.addEventListener('compositionend',function(e){_composing=false;S.rAddName=e.target.value;});
    ni.addEventListener('input',function(e){if(!_composing)S.rAddName=e.target.value;});
    ni.addEventListener('keydown',function(e){if(e.key==='Enter'&&!_composing)act('radd');});
  }
  var reni=document.getElementById('reni');
  if(reni){
    reni.addEventListener('compositionstart',function(){_composing=true;});
    reni.addEventListener('compositionend',function(e){_composing=false;S.rEditName=e.target.value;});
    reni.addEventListener('input',function(e){if(!_composing)S.rEditName=e.target.value;});
  }
  var rsrchEl=document.getElementById('rsrch');
  if(rsrchEl){
    var _rComposing=false;
    rsrchEl.addEventListener('compositionstart',function(){_rComposing=true;});
    rsrchEl.addEventListener('compositionend',function(e){
      _rComposing=false;
      S.rSearch=e.target.value;
      renderRosterList();
    });
    rsrchEl.addEventListener('input',function(e){
      S.rSearch=e.target.value;
      renderRosterList();
    });
  }
  var ngmEl=document.getElementById('ngm');
  if(ngmEl){ngmEl.addEventListener('input',function(e){S.numGames=parseInt(e.target.value)||0;});}
  var inpNc=document.getElementById('inp-nc');
  if(inpNc){
    inpNc.addEventListener('input',function(e){var v=parseInt(e.target.value)||0;S.numCourts=v;});
    inpNc.addEventListener('blur',function(){render();});
    inpNc.addEventListener('keydown',function(e){if(e.key==='Enter'){inpNc.blur();}});
  }
  var inpNg=document.getElementById('inp-ng');
  if(inpNg){inpNg.addEventListener('input',function(e){S.numGames=parseInt(e.target.value)||0;});}
  var asrchEl=document.getElementById('asrch');
  if(asrchEl){
    var _aComposing=false;
    asrchEl.addEventListener('compositionstart',function(){_aComposing=true;});
    asrchEl.addEventListener('compositionend',function(e){
      _aComposing=false;
      S.attendSearch=e.target.value;
      renderAttendList();
    });
    asrchEl.addEventListener('input',function(e){
      S.attendSearch=e.target.value;
      renderAttendList();
    });
  }
  var gn1el=document.getElementById('gn1'),gn2el=document.getElementById('gn2');
  if(gn1el){gn1el.addEventListener('input',function(e){S.groupNames[0]=e.target.value||'1그룹';fbSaveGnames();});}
  if(gn2el){gn2el.addEventListener('input',function(e){S.groupNames[1]=e.target.value||'2그룹';fbSaveGnames();});}
}

// ══════════════════════════════════════════════════════════════════
// 액션
// ══════════════════════════════════════════════════════════════════
function act(a,d){
  d=d||{};

  // ── 공통 ──────────────────────────────────────────────────────
  if(a==='gotab'){S.tab=d.v;render();}
  else if(a==='toggleGuide'){S.showGuide=!S.showGuide;render();}
  else if(a==='thm'){S.theme=S.theme==='dark'?'light':'dark';document.body.classList.toggle('light',S.theme==='light');lsSave();render();}
  else if(a==='shr'){shareApp();}

  // ── 명단 관리 ─────────────────────────────────────────────────
  else if(a==='rag'){S.rAddGender=d.v;render();}
  else if(a==='ral'){S.rAddLevel=d.v;render();}
  else if(a==='rtgi'){S.rShowGrade=!S.rShowGrade;render();}
  else if(a==='radd'){
    var n=S.rAddName.trim(),dup=false;
    for(var i=0;i<S.roster.length;i++)if(S.roster[i].name===n){dup=true;break;}
    if(!n||dup)return;
    S.roster.push({name:n,gender:S.rAddGender,level:S.rAddLevel});
    S.rAddName='';fbSaveRoster();
  }
  else if(a==='rmp'){
    var idx=parseInt(d.i);
    var name=S.roster[idx].name;
    if(!confirm('"'+name+'" 님을 명단에서 삭제할까요?')) return;
    delete S.selected[name];
    S.roster.splice(idx,1);
    if(S.rEditIdx===idx)S.rEditIdx=-1;
    fbSaveRoster();
  }
  else if(a==='rtogsel'){
    S.rSelectMode=!S.rSelectMode;
    if(!S.rSelectMode) S.rSelected={};
    render();
  }
  else if(a==='rtogitem'){
    var n=d.n;
    S.rSelected[n]=!S.rSelected[n];
    render();
  }
  else if(a==='rdelsel'){
    var names=Object.keys(S.rSelected).filter(function(k){return S.rSelected[k];});
    if(names.length===0) return;
    if(!confirm(names.length+'명을 명단에서 삭제할까요?\n('+names.join(', ')+')')) return;
    for(var i=0;i<names.length;i++){
      delete S.selected[names[i]];
      S.roster=S.roster.filter(function(p){return p.name!==names[i];});
    }
    S.rSelected={};S.rSelectMode=false;
    fbSaveRoster();
  }
  else if(a==='redp'){var i=parseInt(d.i),p=S.roster[i];S.rEditIdx=i;S.rEditName=p.name;S.rEditGender=p.gender||'남';S.rEditLevel=p.level;render();}
  else if(a==='resg'){S.rEditGender=d.v;render();}
  else if(a==='resl'){S.rEditLevel=d.v;render();}
  else if(a==='resv'){
    var i=parseInt(d.i);
    var reniEl=document.getElementById('reni');
    var newName=reniEl?reniEl.value.trim():S.rEditName.trim();
    if(!newName)return;
    var dup=false;for(var j=0;j<S.roster.length;j++)if(j!==i&&S.roster[j].name===newName){dup=true;break;}
    if(dup){toast('이미 있는 이름이에요');return;}
    var oldName=S.roster[i].name;
    if(S.selected[oldName]){delete S.selected[oldName];S.selected[newName]=true;}
    S.roster[i]={name:newName,gender:S.rEditGender,level:S.rEditLevel};
    S.rEditIdx=-1;fbSaveRoster();
  }
  else if(a==='recx'){S.rEditIdx=-1;render();}
  else if(a==='rclr'){if(!confirm('전체 명단을 삭제할까요?'))return;S.roster=[];S.selected={};fbSaveRoster();}

  // ── 참석자 선택 ───────────────────────────────────────────────
  else if(a==='rsrchclr'){S.rSearch='';render();}
  else if(a==='selfiltered'){
    var q2=(S.attendSearch||'').trim().toLowerCase();
    S.roster.filter(function(p){return p.name.toLowerCase().indexOf(q2)!==-1;}).forEach(function(p){
      S.selected[p.name]=true;
      if(!S.playerGroups[p.name])S.playerGroups[p.name]=1;
    });
    render();
  }
  else if(a==='tog'){
    var n=d.n;
    S.selected[n]=!S.selected[n];
    if(S.selected[n]&&!S.playerGroups[n]) S.playerGroups[n]=1;
    render();
  }
  else if(a==='courtSelect'){
    var n=d.n, cv=parseInt(d.v);
    if(S.selected[n]&&(S.playerGroups[n]||1)===cv&&!S.lateArrivals[n]){
      // 같은 코트 다시 누르면 참석 취소
      S.selected[n]=false;
    } else {
      // 코트 선택 → 참석 + 배정
      S.selected[n]=true;
      S.playerGroups[n]=cv;
      delete S.lateArrivals[n];
    }
    render();
  }
  else if(a==='togglelate'){
    if(S.lateArrivals[d.n]) delete S.lateArrivals[d.n];
    else S.lateArrivals[d.n]=true;
    render();
  }
  else if(a==='setnc'){S.numCourts=parseInt(d.v);render();}
  else if(a==='setgames'){S.numGames=parseInt(d.v);render();}
  else if(a==='ipMatch'){
    var mid=parseInt(d.id);
    for(var i=0;i<S.matches.length;i++) if(S.matches[i].id===mid){S.matches[i].inProgress=true;break;}
    fbSaveSession();render();
  }
  else if(a==='doneMatch'){
    var mid=parseInt(d.id);
    for(var i=0;i<S.matches.length;i++) if(S.matches[i].id===mid){S.matches[i].done=true;S.matches[i].inProgress=false;break;}
    fbSaveSession();render();
  }
  else if(a==='delMatch'){
    var mid=parseInt(d.id);
    S.matches=S.matches.filter(function(m){return m.id!==mid;});
    fbSaveSession();render();
  }
  else if(a==='arriveLate'){
    var ln=d.n;
    if(!ln) return;
    delete S.lateArrivals[ln];
    var keptMatches=S.matches.filter(function(m){return m.done||m.inProgress;});
    var maxBlock=0;
    for(var i=0;i<keptMatches.length;i++) if(keptMatches[i].blockNum>maxBlock) maxBlock=keptMatches[i].blockNum;
    var keptIds={};
    for(var i=0;i<keptMatches.length;i++){keptIds[keptMatches[i].t1]=true;keptIds[keptMatches[i].t2]=true;}
    var keptTeams=[];
    for(var i=0;i<S.teams.length;i++) if(keptIds[S.teams[i].id]) keptTeams.push(S.teams[i]);
    var remainSets=Math.max(1,S.numGames-maxBlock);
    var origGames=S.numGames;
    S.numGames=remainSets;
    var rot=mkRotationSchedule();
    S.numGames=origGames;
    var tidOff=keptTeams.length>0?Math.max.apply(null,keptTeams.map(function(t){return t.id;}))+1:0;
    var midOff=keptMatches.length>0?Math.max.apply(null,keptMatches.map(function(m){return m.id;}))+1:0;
    for(var i=0;i<rot.teams.length;i++) rot.teams[i].id+=tidOff;
    for(var i=0;i<rot.matches.length;i++){rot.matches[i].id+=midOff;rot.matches[i].t1+=tidOff;rot.matches[i].t2+=tidOff;rot.matches[i].blockNum+=maxBlock;}
    for(var i=0;i<rot.blockInfo.length;i++) rot.blockInfo[i].blockNum+=maxBlock;
    S.teams=keptTeams.concat(rot.teams);
    S.matches=keptMatches.concat(rot.matches);
    S.blockInfo=S.blockInfo.filter(function(b){return b.blockNum<=maxBlock;}).concat(rot.blockInfo);
    fbSaveSession();render();
    toast('✅ '+ln+' 도착! 남은 '+remainSets+'세트에 반영됐어요');
  }
  else if(a==='courtall'){
    var cv=parseInt(d.v);
    for(var k in S.selected){if(S.selected[k]&&!S.lateArrivals[k])S.playerGroups[k]=cv;}
    render();
  }
  else if(a==='grpall'){
    var gv=parseInt(d.v);
    for(var k in S.selected){if(S.selected[k])S.playerGroups[k]=gv;}
    render();
  }
  else if(a==='selall'){
    var all=d.v==='all';
    for(var i=0;i<S.roster.length;i++)S.selected[S.roster[i].name]=all;
    render();
  }

  // ── 매치 흐름 ─────────────────────────────────────────────────
  else if(a==='mg1'){S.mStep=1;render();}
  else if(a==='mg2'){
    if(S.numCourts<1){toast('⚠️ 코트 수를 입력해주세요!');return;}
    if(S.numGames<1){toast('⚠️ 게임(세트) 수를 입력해주세요!');return;}
    S.matches=[];S.teams=[];S.blockInfo=[];S.mStep=2;render();
  }
  else if(a==='sm'){S.pairMode=d.v;render();}
  else if(a==='setgm'){S.groupMode=d.v;render();}
  else if(a==='mmode'){S.matchMode=d.v;render();}
  else if(a==='genmatches'||a==='rsf'){
    if(S.numCourts<1){toast('⚠️ 코트 수를 입력해주세요!');return;}
    if(S.numGames<1){toast('⚠️ 게임(세트) 수를 입력해주세요!');return;}
    doTeams();
    if(S.matchMode==='rotation'){
      var rot=mkRotationSchedule();S.teams=rot.teams;S.matches=rot.matches;S.blockInfo=rot.blockInfo;
    } else {
      S.matches=mkMatches(S.teams);S.blockInfo=[];
    }
    S.mStep=2;fbSaveSession();render();
  }
  else if(a==='mg3'){S.mStep=2;render();}
  else if(a==='mg2b'){S.mStep=2;render();}
  else if(a==='lim'){render();}
  else if(a==='ngmclr'){S.numGames=0;render();}
  else if(a==='saveimg'){generateResultImage();}
  else if(a==='print'){printSchedule();}
  else if(a==='cpr'){copyResults();}
  else if(a==='nr'){
    if(S.standby){S.restCount[S.standby.name]=(S.restCount[S.standby.name]||0)+1;}
    for(var i=0;i<S.teams.length;i++){var k=pk(S.teams[i].p1,S.teams[i].p2),found=false;for(var j=0;j<S.history.length;j++)if(S.history[j]===k){found=true;break;}if(!found)S.history.push(k);}
    S.round++;doTeams();
    if(S.matchMode==='rotation'){
      var rot=mkRotationSchedule();S.teams=rot.teams;S.matches=rot.matches;S.blockInfo=rot.blockInfo;
    } else {
      S.matches=mkMatches(S.teams);S.blockInfo=[];
    }
    S.mStep=2;fbSaveSession();render();
  }
  else if(a==='rst'){
    S.standby=null;S.teams=[];S.matches=[];S.pairMode='random';
    S.history=[];S.round=1;S.dup=false;S.numGames=0;S.numCourts=1;S.matchMode='rotation';S.numRotations=10;S.groups={};S.groupNames=['1그룹','2그룹'];S.playerGroups={};S.restCount={};S.blockInfo=[];S.attendSearch='';S.groupMode='intra';S.lateArrivals={};
    S.mStep=1;
    if(db) db.ref('session').remove(); // Firebase에서 세션 삭제
    render();
  }
}

// ── 클릭 이벤트 ──────────────────────────────────────────────────
document.addEventListener('click',function(e){
  // 가장 가까운 data-a 요소부터 처리 (pgrp 버튼이 tog 보다 우선)
  var el=e.target.closest('[data-a]');
  if(!el||el.disabled)return;
  // pgrp 버튼 클릭 시 부모 attend-item(tog)으로 전파 방지
  if(el.dataset.a==='pgrp'||el.dataset.a==='grpall'||el.dataset.a==='togglelate'||el.dataset.a==='setnc'||el.dataset.a==='courtall'||el.dataset.a==='setgames'||el.dataset.a==='arriveLate'||el.dataset.a==='rtogitem'||el.dataset.a==='rtogsel'||el.dataset.a==='rdelsel'||el.dataset.a==='courtSelect'||el.dataset.a==='doneMatch'||el.dataset.a==='delMatch'){
    e.stopPropagation();
  }
  act(el.dataset.a,el.dataset);
});

// ── 시작 ─────────────────────────────────────────────────────────
lsLoad(); // 테마 + 로컬 명단 로드
document.body.classList.toggle('light',S.theme==='light');
render();
loadFirebase(); // Firebase 동적 로드 → 연결 후 자동 re-render
</script>
