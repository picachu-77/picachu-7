<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#0d3b2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="피카츄의 배드민턴매치">
<title>⚡ 피카츄의 배드민턴매치</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body {
  --bg:#0d3b2e; --white:#f5f5f0; --muted:rgba(255,255,255,.38);
  --card:rgba(255,255,255,.06); --border:rgba(255,255,255,.11);
  --warn:#f1a035; --red:#f15555; --lime:#c8f135;
  --input-bg:rgba(255,255,255,.09); --fbox-bg:rgba(255,255,255,.05);
  --chip-bg:rgba(255,255,255,.07); --mode-bg:rgba(255,255,255,.06);
  --shadow:0 2px 12px rgba(0,0,0,.3); --tab-active:rgba(200,241,53,.15);
}
body.light {
  --bg:#e8f5e9; --white:#1b2e1b; --muted:rgba(0,0,0,.45);
  --card:rgba(255,255,255,.75); --border:rgba(0,0,0,.12);
  --warn:#e67e00; --red:#d32f2f; --lime:#5a9e00;
  --input-bg:rgba(255,255,255,.9); --fbox-bg:rgba(255,255,255,.6);
  --chip-bg:rgba(255,255,255,.85); --mode-bg:rgba(255,255,255,.7);
  --shadow:0 2px 12px rgba(0,0,0,.1); --tab-active:rgba(90,158,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'DM Sans','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--white);min-height:100vh;overscroll-behavior:none;transition:background .25s,color .25s}
button,input{font-family:inherit;-webkit-appearance:none;appearance:none;border:none}
button{cursor:pointer;touch-action:manipulation}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.3);border-radius:4px}

#app{min-height:100vh;display:flex;justify-content:center;padding:0 0 80px;
  background-image:radial-gradient(ellipse at 15% 60%,rgba(200,241,53,.04) 0%,transparent 55%),
  radial-gradient(ellipse at 85% 15%,rgba(53,136,241,.03) 0%,transparent 50%)}
.wrap{width:100%;max-width:480px;transition:max-width .3s ease}

/* ── 상단 헤더 ── */
.app-header{padding:20px 20px 0;text-align:center;position:relative}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--lime)}
.app-sub{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:16px}
.theme-btn{position:absolute;top:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--muted)}
.share-btn{position:absolute;top:20px;left:20px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12px;color:var(--muted)}

/* ── 탭 ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin:0 20px}
.tab{flex:1;padding:12px 0;text-align:center;font-weight:700;font-size:14px;
  color:var(--muted);background:transparent;border-bottom:2px solid transparent;
  transition:all .2s;margin-bottom:-1px}
.tab.active{color:var(--lime);border-bottom-color:var(--lime)}

/* ── 콘텐츠 ── */
.content{padding:16px 20px}

/* ── 스텝바 ── */
.sbar{display:flex;align-items:flex-start;justify-content:center;margin-bottom:20px}
.sdot-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;transition:all .3s}
.sdot.done,.sdot.active{background:var(--lime);border:2px solid var(--lime);color:#0d3b2e}
.sdot.idle{background:transparent;border:2px solid var(--border);color:var(--muted)}
.slabel{font-size:9px}
.slabel.active{color:var(--lime);font-weight:700}
.slabel.idle{color:var(--muted)}
.sline{width:32px;height:2px;margin:0 2px;margin-bottom:16px}
.sline.done{background:var(--lime)}
.sline.idle{background:var(--border)}

/* ── 카드 ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow);margin-bottom:12px}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:3px}
.sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.lbl{font-size:12px;color:var(--muted);margin-bottom:5px}

/* ── 뱃지/태그 ── */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:9px;font-size:11px;font-weight:800}
.tag{display:inline-block;padding:2px 8px;border-radius:16px;font-size:11px;font-weight:700}

/* ── 버튼 ── */
.btn{padding:12px 16px;border-radius:11px;font-weight:700;font-size:14px;min-height:46px;
  transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn.pri{background:var(--lime);color:#0d3b2e}
.btn.gho{background:var(--card);border:1px solid var(--border);color:var(--white)}
.btn.suc{background:rgba(100,200,100,.18);border:1px solid rgba(100,200,100,.35);color:#66cc66}
.btn.dan{background:rgba(241,85,85,.12);border:1px solid rgba(241,85,85,.3);color:var(--red)}
.btn:disabled{opacity:.35;pointer-events:none}
.brow{display:flex;gap:8px}

/* ── 입력 ── */
.inp{width:100%;padding:11px 13px;border-radius:10px;background:var(--input-bg);border:1px solid var(--border);color:var(--white);font-size:15px;outline:none;transition:border .15s}
.inp:focus{border-color:var(--lime)}
.inp.err{border-color:var(--red)}
.err-txt{font-size:11px;color:var(--red);margin-top:3px}

/* ── 등급 토글 ── */
.lv-group{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.lv-btn{padding:7px 0;border-radius:7px;font-weight:800;font-size:12px;min-height:34px;transition:all .15s;border:1px solid transparent;letter-spacing:1px}
.g-group{display:flex;gap:5px}
.g-btn{flex:1;padding:9px 0;border-radius:9px;font-weight:700;font-size:13px;min-height:42px;transition:all .15s;border:1px solid transparent}

/* ── 명단 ── */
.roster-item{display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:12px;
  background:var(--card);border:1px solid var(--border);margin-bottom:7px;transition:background .15s}
.roster-item.editing{background:var(--fbox-bg);border-color:var(--lime)}
.roster-num{width:22px;height:22px;border-radius:50%;background:var(--lime);color:#0d3b2e;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.roster-info{flex:1;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.roster-name{font-weight:700;font-size:14px}
.roster-actions{display:flex;gap:4px;flex-shrink:0}
.icon-btn{background:transparent;padding:4px 7px;border-radius:7px;font-size:14px;color:var(--muted);border:1px solid var(--border)}
.edit-form{display:flex;flex-direction:column;gap:7px;flex:1}

/* ── 참석자 선택 ── */
.attend-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;
  background:var(--card);border:1px solid var(--border);margin-bottom:7px;transition:all .15s;cursor:pointer}
.attend-item.selected{background:var(--tab-active);border-color:var(--lime)}
.attend-item.standby-mark{border-color:var(--warn);background:rgba(241,160,53,.08)}
.chk-box{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-size:13px}
.chk-box.on{background:var(--lime);border-color:var(--lime);color:#0d3b2e}
.attend-info{flex:1}
.attend-name{font-weight:700;font-size:14px;margin-bottom:2px}
.attend-badges{display:flex;gap:4px;flex-wrap:wrap}
.select-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.select-count{font-size:13px;color:var(--muted)}
.select-all-btn{font-size:12px;font-weight:700;color:var(--lime);background:transparent;padding:4px 8px;border-radius:8px;border:1px solid rgba(200,241,53,.3)}

/* ── 팀 구성 ── */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.mbtn{padding:10px 11px;border-radius:11px;text-align:left;min-height:54px;
  transition:all .15s;border:1px solid var(--border);background:var(--mode-bg);color:var(--muted);cursor:pointer;width:100%}
.mbtn.active{background:var(--tab-active);border-color:var(--lime);color:var(--lime)}
.mbtn-lbl{font-weight:700;font-size:12px;margin-bottom:2px}
.mbtn-desc{font-size:10px;opacity:.7}
.tcard{padding:11px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);margin-bottom:7px}
.tdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#0d3b2e;font-weight:700;font-size:11px;flex-shrink:0}
.lgroup{display:flex;gap:6px;margin-bottom:12px}
.lbtn{flex:1;padding:11px 0;border-radius:10px;font-weight:700;font-size:16px;min-height:46px;transition:all .15s;border:1px solid transparent}
.lbtn.active{background:var(--lime);color:#0d3b2e}
.lbtn.idle{background:var(--card);border:1px solid var(--border);color:var(--muted)}

/* ── 대진표 ── */
.mcard{border-radius:14px;overflow:hidden;border:1px solid var(--border);background:var(--card);margin-bottom:10px;box-shadow:var(--shadow);transition:all .2s}
.mcard:active{transform:scale(.98)}
.mbody{padding:16px 18px;display:flex;align-items:center;gap:7px}
.mteam{flex:1}
.mteam.r{text-align:right}
.mname{font-weight:700;font-size:15px;margin-bottom:5px;color:var(--white);line-height:1.3}
.mcenter{text-align:center;min-width:48px;flex-shrink:0}
.set-divider{display:flex;align-items:center;gap:8px;margin:18px 0 10px}
.set-divider-line{flex:1;height:1px;background:var(--border)}
.set-divider-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--lime);white-space:nowrap;background:var(--bg);padding:0 4px}

/* ── 알림/토스트 ── */
.notice{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border-radius:11px;margin-bottom:10px}
.notice .ni{font-size:18px;flex-shrink:0;margin-top:1px}
.notice .nt{font-weight:700;font-size:13px}
.notice .ns{font-size:11px;color:var(--muted);margin-top:2px}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(0,0,0,.82);color:#fff;padding:9px 18px;border-radius:18px;
  font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 등급 안내 ── */
.grade-guide{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;display:flex;flex-direction:column;gap:7px}
.grade-card{padding:10px 12px;border-radius:10px}
.grade-card-header{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.grade-key{font-weight:800;font-size:14px;padding:2px 9px;border-radius:7px}
.grade-short{font-weight:700;font-size:12px}
.grade-desc{font-size:11px;color:var(--muted);margin-bottom:4px}
.grade-ul{padding-left:13px;display:flex;flex-direction:column;gap:2px}
.grade-li{font-size:11px}

/* ── 빈 상태 ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-txt{font-size:14px}
.empty-sub{font-size:12px;margin-top:4px;opacity:.7}

/* ── 프린트 ── */
#print-area{display:none;}
@media print {
  #app{display:none!important;}
  #toast{display:none!important;}
  #print-area{display:block!important;font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;color:#000;padding:20px;}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════════════════════
// 상수
// ══════════════════════════════════════════════════════════════════
var LV=[
  {key:'E-',sc:0,color:'#90a4ae'},{key:'E',sc:1,color:'#90a4ae'},{key:'E+',sc:2,color:'#90a4ae'},
  {key:'D-',sc:3,color:'#4fc3f7'},{key:'D',sc:4,color:'#4fc3f7'},{key:'D+',sc:5,color:'#4fc3f7'},
  {key:'C-',sc:6,color:'#66bb6a'},{key:'C',sc:7,color:'#66bb6a'},{key:'C+',sc:8,color:'#66bb6a'},
  {key:'B-',sc:9,color:'#f1d035'},{key:'B',sc:10,color:'#f1d035'},{key:'B+',sc:11,color:'#f1d035'},
  {key:'A-',sc:12,color:'#f18835'},{key:'A',sc:13,color:'#f18835'},{key:'A+',sc:14,color:'#f18835'},
  {key:'S-',sc:15,color:'#f15555'},{key:'S',sc:16,color:'#f15555'},{key:'S+',sc:17,color:'#f15555'}
];
var LV_INFO={
  'E-':{short:'완전 입문',desc:'배드민턴을 시작한 지 얼마 안 됐어요.',details:['처음으로 라켓을 잡아보는 단계','기본 그립·자세를 배우는 중']},
  'E':{short:'아직 시작 단계',desc:'배드민턴을 처음 접하는 수준이에요.',details:['서브를 코트 안에 넣기 어려울 수 있어요','기본기(그립·자세)를 배우는 중','랠리를 3회 이상 이어가기 힘든 수준']},
  'E+':{short:'시작 단계 후반',desc:'기본기 시작 후반부예요.',details:['짧은 랠리는 가끔 이어짐','서브 성공률이 점점 올라가는 중']},
  'D-':{short:'기본기 시작',desc:'기초 동작 초기예요.',details:['서브를 코트 안에 넣을 수 있음','짧은 랠리 시도 가능']},
  'D':{short:'기본기 익히는 중',desc:'기초 동작을 배우고 있는 단계예요.',details:['서브를 안정적으로 넣을 수 있음','짧은 랠리(5~10회) 가능','클리어·드롭 등 기본 샷을 시도할 수 있음','풋워크·포지션 개념을 익히는 중']},
  'D+':{short:'기본기 후반',desc:'기본기가 자리 잡혀가요.',details:['랠리가 안정적으로 이어짐','다양한 샷 시도 가능']},
  'C-':{short:'입문 초반',desc:'동호회 입문 초기예요.',details:['게임 규칙을 알고 진행 가능','기본 샷 구사']},
  'C':{short:'어느 정도 칠 수 있음',desc:'동호회 입문 수준이에요.',details:['클리어·드롭·스매시를 기본적으로 구사','랠리를 어느 정도 이어갈 수 있음','경기 규칙을 알고 게임 진행 가능','코트 전체를 커버하기엔 아직 부족']},
  'C+':{short:'입문 후반',desc:'입문에서 중급으로 가는 단계예요.',details:['샷의 정확도가 올라감','복식 포지션을 이해하기 시작']},
  'B-':{short:'중급 초반',desc:'동호회 중급 초기예요.',details:['안정적인 플레이','전술적 판단 시작']},
  'B':{short:'동호회 중간 수준',desc:'동호회 평균 수준이에요.',details:['안정적인 랠리와 다양한 샷 구사 가능','코트를 넓게 활용하는 플레이','스매시·헤어핀·푸시 등을 적절히 사용','복식 전술(앞뒤·좌우)을 이해하고 있음']},
  'B+':{short:'중급 후반',desc:'중급에서 상급으로 가는 단계예요.',details:['고급 샷 시도 가능','전술 응용력 향상']},
  'A-':{short:'상급 초반',desc:'동호회 상급 초기예요.',details:['파워와 정확도 균형','코트 커버 범위 넓음']},
  'A':{short:'잘 치는 편',desc:'동호회 상위 수준이에요.',details:['강하고 정확한 스매시·드롭 구사','리시브가 안정적이고 수비 범위 넓음','전술적 판단으로 상대를 흔드는 플레이','체력·순발력을 바탕으로 한 압박 가능']},
  'A+':{short:'상급 후반',desc:'에이스급으로 가는 단계예요.',details:['거의 모든 샷 자유자재','경기 흐름 주도']},
  'S-':{short:'최상위 초반',desc:'클럽 최상위 진입 단계예요.',details:['대회 입상권 실력','파트너를 리드하는 플레이']},
  'S':{short:'에이스 수준',desc:'클럽 최상위 수준이에요.',details:['압도적인 기술·체력·전술을 모두 갖춤','공식 동호인 대회 입상 경험 수준','거의 모든 샷을 자유자재로 구사','파트너를 리드하며 경기를 지배하는 수준']},
  'S+':{short:'최정상',desc:'최정상급이에요.',details:['전국 대회 수준','거의 모든 면에서 완성형']}
};
var TC=['#c8f135','#f1d035','#35f1c8','#f13588','#3588f1','#f18835','#a835f1','#35f158'];
var MODES=[
  {key:'random',   lb:'🎲 랜덤',         ds:'그냥 섞기'},
  {key:'balanced', lb:'🤝 밸런스 매치',  ds:'양 팀 실력 비슷하게'},
  {key:'sameclose',lb:'🎯 수준별(좁게)', ds:'딱 비슷한 등급끼리'},
  {key:'samewide', lb:'🎺 수준별(넓게)', ds:'인접 등급도 섞이게'},
  {key:'cycle',    lb:'🔁 순환',         ds:'랜덤→밸런스→수준별 반복'}
]
// 순환: 3세트 1주기 (랜덤,밸런스,수준별) — 수준별만 주기마다 좁게↔넓게 번갈아
var CYCLE_MODES=['random','balanced','sameclose','random','balanced','samewide'];
var CYCLE_LABELS=['🎲 랜덤','🤝 밸런스 매치','🎯 수준별(좁게)','🎲 랜덤','🤝 밸런스 매치','🎺 수준별(넓게)'];
function getCycleMode(idx){return CYCLE_MODES[idx%6];}

// Firebase 실시간 리스너
function fbListen(){
  db.ref('roster').on('value',function(snap){
    var data=snap.val();
    var roster=[];
    if(data){
      // Firebase는 배열을 객체로 저장할 수 있음 → 변환
      if(Array.isArray(data)){
        roster=data.filter(function(p){return p&&p.name;});
      } else if(typeof data==='object'){
        var keys=Object.keys(data);
        for(var i=0;i<keys.length;i++){
          if(data[keys[i]]&&data[keys[i]].name) roster.push(data[keys[i]]);
        }
      }
    }
    if(roster.length>0){
      S.roster=roster;
      S.roster.sort(function(a,b){return a.name.localeCompare(b.name,'ko');});
      lsRosterSave();
      render();
    } else if(S.roster.length>0){
      // Firebase 비어있고 로컬에 있으면 Firebase에 업로드
      db.ref('roster').set(S.roster);
    }
  });
  db.ref('groupNames').on('value',function(snap){
    var data=snap.val();
    if(data&&Array.isArray(data))S.groupNames=data;
    render();
  });
  // 대진표 세션 불러오기 — 물어보고 복구
  db.ref('session').once('value',function(snap){
    var d=snap.val();
    if(!d||!d.teams||!d.teams.length) return;
    // 확인 팝업
    showRestoreDialog(d);
  });
}

function shuf(a){var r=a.slice(),i,j,t;for(i=r.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));t=r[i];r[i]=r[j];r[j]=t;}return r;}
function pk(a,b){return[a.name,b.name].sort().join('||');}
function lsc(p){for(var i=0;i<LV.length;i++)if(LV[i].key===p.level)return LV[i].sc;return 0;}
function linfo(k){for(var i=0;i<LV.length;i++)if(LV[i].key===k)return LV[i];return LV[0];}
function hasDup(ts,h){var i,j,key;h=h||S.history;for(i=0;i<ts.length;i++){key=pk(ts[i].p1,ts[i].p2);for(j=0;j<h.length;j++)if(h[j]===key)return true;}return false;}
function pairUp(arr){var t=[];for(var i=0;i<arr.length-1;i+=2)t.push({id:i/2,p1:arr[i],p2:arr[i+1]});return t;}
function getSelected(){

// 팀 구성 로직
// ══════════════════════════════════════════════════════════════════
function bRandom(ps,h){for(var t=0;t<60;t++){var ts=pairUp(shuf(ps));if(!hasDup(ts,h))return{teams:ts,dup:false};}return{teams:pairUp(shuf(ps)),dup:true};}
function bBal(ps,h){
  // 4명씩 묶어서 두 팀의 실력 합이 최대한 비슷하게 분할
  var s=ps.slice().sort(function(a,b){return lsc(b)-lsc(a);});
  var teams=[],id=0,i;
  for(i=0;i+3<s.length;i+=4){
    var g=s.slice(i,i+4); // 등급 높은 순 4명
    // 3가지 분할 중 두 팀 합 차이가 가장 작은 것
    var opts=[[0,3,1,2],[0,1,2,3],[0,2,1,3]];
    var best=opts[0],bestDiff=Infinity;
    for(var o=0;o<opts.length;o++){
      var c=opts[o];
      var s1=lsc(g[c[0]])+lsc(g[c[1]]);
      var s2=lsc(g[c[2]])+lsc(g[c[3]]);
      var diff=Math.abs(s1-s2);
      if(diff<bestDiff){bestDiff=diff;best=c;}
    }
    teams.push({id:id++,p1:g[best[0]],p2:g[best[1]]});
    teams.push({id:id++,p1:g[best[2]],p2:g[best[3]]});
  }
  // 나머지 인원 (4의 배수가 아닐 때) — 고수+초보 페어
  var left=s.slice(i);
  if(left.length>=2){
    var half=Math.floor(left.length/2);
    var topL=left.slice(0,half),botL=left.slice(half);
    for(var k=0;k<half;k++) teams.push({id:id++,p1:topL[k],p2:botL[k]});
  }
  return{teams:teams,dup:hasDup(teams,h)};
}
// 동급 대결: 급수 순 정렬 → 4명씩 묶어서 그 안에서 랜덤 페어
// → 한 경기의 4명이 최대한 비슷한 수준
function bSameLevel(ps,h){
  var s=ps.slice().sort(function(a,b){return lsc(a)-lsc(b);});
  var teams=[],id=0,i;
  for(i=0;i+3<s.length;i+=4){
    var g=s.slice(i,i+4);
    // 동급 대결은 인접 페어링만 사용 (비슷한 등급끼리 묶기)
    // g[0]·g[1] (낮은 둘) vs g[2]·g[3] (높은 둘)
    teams.push({id:id++,p1:g[0],p2:g[1]});
    teams.push({id:id++,p1:g[2],p2:g[3]});
  }
  // 나머지 인원 처리 (4의 배수가 아닐 때)
  var left=s.slice(i);
  while(left.length>=2) teams.push({id:id++,p1:left.shift(),p2:left.shift()});
  return{teams:teams,dup:hasDup(teams,h)};
}
function buildWithMode(ps,h,mode){
  if(mode==='balanced') return bBal(ps,h);
  if(mode==='sameclose'||mode==='samewide') return bSameLevel(ps,h);
  return bRandom(ps,h);
}
function build(ps,h){return buildWithMode(ps,h,S.pairMode);}
// 팀 평균 급수 계산
function teamAvgLv(t){return lsc(t.p1)+lsc(t.p2);}
// 두 팀 간 급수 차이
function teamLvDiff(ta,tb){return Math.abs(teamAvgLv(ta)-teamAvgLv(tb));}
function pickSB(ps,prevSB,rc){
  rc=rc||S.restCount;
  var sorted=ps.slice().sort(function(a,b){return (rc[a.name]||0)-(rc[b.name]||0);});
  var other=sorted.filter(function(p){return!prevSB||p.name!==prevSB.name;});
  return other.length?other[0]:sorted[0];
}
function doTeams(){
  var ps=getSelected(),isOdd=ps.length%2,ac=ps,sb=null;
  if(isOdd){sb=pickSB(ps,S.standby,S.restCount);ac=ps.filter(function(p){return p.name!==sb.name;});}
  S.standby=sb;S.groups={};

  if(S.matchMode==='mixed'){
    var g1=ac.filter(function(p){return (S.playerGroups[p.name]||1)===1;});
    var g2=ac.filter(function(p){return (S.playerGroups[p.name]||1)===2;});
    if(g1.length%2!==0&&g1.length>0){g2.push(g1.pop());}
    if(g2.length%2!==0&&g2.length>0){g1.push(g2.pop());}
    var r1=g1.length>=2?build(g1):{teams:[],dup:false};
    var r2=g2.length>=2?build(g2):{teams:[],dup:false};
    var allTeams=[],id=0;
    for(var i=0;i<r1.teams.length;i++){r1.teams[i].id=id++;allTeams.push(r1.teams[i]);S.groups[r1.teams[i].id]=1;}
    for(var i=0;i<r2.teams.length;i++){r2.teams[i].id=id++;allTeams.push(r2.teams[i]);S.groups[r2.teams[i].id]=2;}
    S.teams=allTeams;S.dup=r1.dup||r2.dup;
  } else {
    var r=build(ac);S.teams=r.teams;S.dup=r.dup;
  }
}

// 로테이션 스케줄 생성 (세트마다 팀 재배정)
function mkRotationSchedule(){
  var lates=getLateArrivals();
  var ps=getSelected(); // 늦참 제외
  var psAll=lates.length>0?ps.concat(lates):ps; // 늦참 합류용
  var tempH=S.history.slice();
  var tempSB=S.standby;
  var tempRC={};for(var k in S.restCount)tempRC[k]=S.restCount[k];
  var allTeams=[],allMatches=[],blockInfo=[];
  var teamId=0,matchId=0;

  // 누적 출전 횟수 & 마지막 출전 세트 & 페어 카운트 & 함께 게임 횟수
  var playCount={};
  var lastPlayedSet={};
  var pairCount={};      // 두 사람이 같은 팀(파트너)이었던 횟수
  var encounterCount={}; // 두 사람이 같은 게임(4명)에 있던 횟수 (상대 포함)
  for(var i=0;i<ps.length;i++){playCount[ps[i].name]=0; lastPlayedSet[ps[i].name]=-1;}
  function pairKey(a,b){return [a,b].sort().join('||');}
  // 4명이 한 게임에 모였을 때 서로 만난 횟수 기록
  function recordEncounter(four){
    for(var x=0;x<four.length;x++)for(var y=x+1;y<four.length;y++){
      var k=pairKey(four[x].name,four[y].name);
      encounterCount[k]=(encounterCount[k]||0)+1;
    }
  }
  // 후보가 이미 뽑힌 그룹과 얼마나 자주 만났는지 합산
  function encScore(cand,group){
    var s=0;
    for(var i=0;i<group.length;i++) s+=(encounterCount[pairKey(cand.name,group[i].name)]||0);
    return s;
  }

  // 4명의 3가지 페어링 중 점수가 가장 낮은 것 (파트너 중복 + 상대 만남 중복)
  function findBestPairing(four){
    if(!four||four.length!==4) return null;
    var options=[
      [[four[0],four[1]],[four[2],four[3]]],
      [[four[0],four[2]],[four[1],four[3]]],
      [[four[0],four[3]],[four[1],four[2]]]
    ];
    var best=null,bestScore=Infinity;
    for(var i=0;i<options.length;i++){
      var o=options[i];
      // 파트너 중복 (같은 팀이었던 횟수)
      var partnerS=(pairCount[pairKey(o[0][0].name,o[0][1].name)]||0)+
                   (pairCount[pairKey(o[1][0].name,o[1][1].name)]||0);
      if(partnerS<bestScore){bestScore=partnerS;best=o;}
    }
    return {pairing:best,score:bestScore};
  }

  // 여러 명을 4명씩 여러 게임으로 나누기 (코트 수 무관, 다양성 최대)
  // greedy: 아직 안 만난 사람끼리 묶어서 각 게임의 만남 중복 최소화
  function splitIntoGames(players, numGames){
    var remaining=players.slice();
    var games=[];
    for(var g=0;g<numGames;g++){
      if(remaining.length<4) break;
      // 첫 사람: 남은 사람 중 임의(앞에서)
      var group=[remaining.shift()];
      // 나머지 3명: 이미 뽑힌 group과 만남 횟수가 가장 적은 사람부터
      while(group.length<4&&remaining.length>0){
        remaining.sort(function(a,b){
          var sa=0,sb=0;
          for(var i=0;i<group.length;i++){
            sa+=(encounterCount[pairKey(a.name,group[i].name)]||0);
            sb+=(encounterCount[pairKey(b.name,group[i].name)]||0);
          }
          if(sa!==sb) return sa-sb;
          // 동점이면 파트너 중복 적은 사람
          var pa=0,pb=0;
          for(var i=0;i<group.length;i++){
            pa+=(pairCount[pairKey(a.name,group[i].name)]||0);
            pb+=(pairCount[pairKey(b.name,group[i].name)]||0);
          }
          if(pa!==pb) return pa-pb;
          return Math.random()-0.5;
        });
        group.push(remaining.shift());
      }
      // 4명 안에서 최적 페어링 (파트너 중복 최소)
      var bp=findBestPairing(group);
      games.push(bp?bp.pairing:[[group[0],group[1]],[group[2],group[3]]]);
    }
    return games;
  }

  // 4명이 서로 만난 총 횟수 (게임 내 다양성)
  function groupEncScore(four){
    var s=0;
    for(var x=0;x<four.length;x++)for(var y=x+1;y<four.length;y++){
      s+=(encounterCount[pairKey(four[x].name,four[y].name)]||0);
    }
    return s;
  }

  // 8명을 2게임(4명+4명)으로 나누는 최적 분할 + 페어링 (완전탐색)
  function splitInto2Games(eight){
    if(!eight||eight.length<8) return null;
    var bestSplit=null,bestScore=Infinity;
    for(var b=1;b<6;b++){
      for(var c=b+1;c<7;c++){
        for(var d=c+1;d<8;d++){
          var g1=[eight[0],eight[b],eight[c],eight[d]];
          var g2=[];
          for(var i=0;i<8;i++){
            if(i!==0&&i!==b&&i!==c&&i!==d) g2.push(eight[i]);
          }
          var p1=findBestPairing(g1);
          var p2=findBestPairing(g2);
          if(!p1||!p2) continue;
          var encS=groupEncScore(g1)+groupEncScore(g2);
          var s=(p1.score+p2.score)+encS*3;
          if(s<bestScore){bestScore=s;bestSplit={g1:p1.pairing,g2:p2.pairing};}
        }
      }
    }
    return bestSplit;
  }

  // [구버전 호환] 4명 페어링 최적화
  function optimizePairing(team1,team2){
    if(!team1||!team2) return null;
    var p=[team1.p1,team1.p2,team2.p1,team2.p2];
    var res=findBestPairing(p);
    if(!res) return null;
    return [
      {p1:res.pairing[0][0],p2:res.pairing[0][1]},
      {p1:res.pairing[1][0],p2:res.pairing[1][1]}
    ];
  }

  // 동급 대결 모드용: 비슷한 등급 4명 뽑기
  function pickSameLevelGroup(pool,n){
    if(pool.length<=n) return pool.slice();
    var withCount=pool.map(function(p){return {p:p,c:playCount[p.name]||0};});
    withCount.sort(function(a,b){return a.c-b.c;});
    var minC=withCount[0].c;
    var candidates=withCount.filter(function(x){return x.c<=minC+1;}).map(function(x){return x.p;});
    if(candidates.length<n){
      candidates=withCount.slice(0,Math.max(n,Math.min(n*2,withCount.length))).map(function(x){return x.p;});
    }
    candidates.sort(function(a,b){return lsc(a)-lsc(b);});
    // 등급 차이가 최소인 연속 n명 윈도우 선택
    var bestStart=0,bestRange=Infinity;
    for(var i=0;i+n<=candidates.length;i++){
      var r=lsc(candidates[i+n-1])-lsc(candidates[i]);
      if(r<bestRange){bestRange=r;bestStart=i;}
    }
    return candidates.slice(bestStart,bestStart+n);
  }

  // 수준별(넓게): 출전 공평성 우선 확보 후, 그 안에서 인접 등급끼리 묶기
  function pickWideLevelGroup(pool,n,curSet){
    if(pool.length<=n) return pool.slice();
    // 출전 공평성을 지킨 후보를 약간 넓게 확보 (n+2명)
    var poolSize=Math.min(pool.length,n+2);
    var cand=pickFewestPlayers(pool,poolSize,curSet);
    // 등급순 정렬 후 인접 n명 (등급 비슷하되 매번 약간 다른 멤버)
    cand.sort(function(a,b){return lsc(a)-lsc(b);});
    var maxStart=cand.length-n;
    var startIdx=maxStart>0?Math.floor(Math.random()*(maxStart+1)):0;
    return cand.slice(startIdx,startIdx+n);
  }

  // 우선순위: 출전 횟수 → 3판이상 쉰사람 강제(상한) → 다양성 → 오래 쉰 사람 → 랜덤
  // 다양성 최우선, 단 아무도 3판 넘게 쉬지 않도록 상한 적용
  function pickFewestPlayers(pool,n,curSet){
    var picked=[];
    var remaining=pool.slice();
    while(picked.length<n&&remaining.length>0){
      remaining.sort(function(a,b){
        var ca=playCount[a.name]||0, cb=playCount[b.name]||0;
        // 1순위: 출전 횟수 (공평성)
        if(ca!==cb) return ca-cb;
        // 2순위: 3판 이상 쉰 사람 강제 투입 (텀 절대 상한)
        var la=lastPlayedSet[a.name];if(la===undefined||la===null)la=-1;
        var lb=lastPlayedSet[b.name];if(lb===undefined||lb===null)lb=-1;
        var gapA=(curSet||0)-1-la, gapB=(curSet||0)-1-lb;
        var hardA=gapA>=3?0:1, hardB=gapB>=3?0:1;
        if(hardA!==hardB) return hardA-hardB;
        // 3순위: 다양성 (안 만난 사람 우선)
        if(picked.length>0){
          var ea=encScore(a,picked), eb=encScore(b,picked);
          if(ea!==eb) return ea-eb;
          var sa=0,sb=0;
          for(var pi=0;pi<picked.length;pi++){
            sa+=(pairCount[pairKey(a.name,picked[pi].name)]||0);
            sb+=(pairCount[pairKey(b.name,picked[pi].name)]||0);
          }
          if(sa!==sb) return sa-sb;
        }
        // 4순위: 오래 쉰 사람 (텀 방지)
        if(la!==lb) return la-lb;
        return Math.random()-0.5;
      });
      picked.push(remaining.shift());
    }
    return picked;
  }

  // 코트별 선수 분류 (numCourts개 코트)
  var nc=Math.max(1,S.numCourts||1);
  var courtPlayers={};
  var hasMultiCourt=false;
  for(var ci=1;ci<=nc;ci++){
    courtPlayers[ci]=ps.filter(function(p){return (S.playerGroups[p.name]||1)===ci;});
  }
  var courtsWithPlayers=0;
  for(var ci=1;ci<=nc;ci++) if(courtPlayers[ci].length>=4) courtsWithPlayers++;
  hasMultiCourt=courtsWithPlayers>=2;
  var g1ps=courtPlayers[1]||[];
  var g2ps=courtPlayers[2]||[];
  var hasGroups=S.groupMode!=='any'&&hasMultiCourt;

  // 게임 수 = 세트 수 (직접 사용)
  var numRot=S.numGames>0?S.numGames:4;

  for(var b=0;b<numRot;b++){
    var blockMode=S.pairMode==='cycle'?getCycleMode(b):S.pairMode;
    var blockLabel=S.pairMode==='cycle'?getCycleLabel(b):'';

    if(hasGroups){
      // ── 멀티코트 모드: 각 코트 안에서 공평하게 4명 선택 → 팀 구성 ──
      var dup=false;
      for(var ci=1;ci<=nc;ci++){
        var cps=courtPlayers[ci]||[];
        if(cps.length<4) continue;
        // 선수 선택: 모드별로 다르게
        var playing;
        if(blockMode==='sameclose'){
          playing=pickSameLevelGroup(cps,4);
        } else if(blockMode==='samewide'){
          playing=pickWideLevelGroup(cps,4,b);
        } else {
          playing=pickFewestPlayers(cps,4,b);
        }
        var rc=buildWithMode(playing,tempH,blockMode);
        var bt=rc.teams.slice(0,2);
        // 랜덤/순환 모드면 페어링 최적화 (균형/동급은 의도 보존)
        if(bt.length===2&&blockMode==='random'){
          var opt=optimizePairing(bt[0],bt[1]);
          if(opt){bt[0].p1=opt[0].p1;bt[0].p2=opt[0].p2;bt[1].p1=opt[1].p1;bt[1].p2=opt[1].p2;}
        }
        dup=dup||rc.dup;
        for(var i=0;i<bt.length;i++){
          var kk=pk(bt[i].p1,bt[i].p2);
          if(tempH.indexOf(kk)===-1) tempH.push(kk);
          bt[i].id=teamId++;bt[i].blockNum=b+1;bt[i].grp=ci;
          allTeams.push(bt[i]);
          // 출전 횟수 + 마지막 출전 세트 + 페어 카운트 업데이트
          playCount[bt[i].p1.name]=(playCount[bt[i].p1.name]||0)+1;
          playCount[bt[i].p2.name]=(playCount[bt[i].p2.name]||0)+1;
          lastPlayedSet[bt[i].p1.name]=b;
          lastPlayedSet[bt[i].p2.name]=b;
          var pk2=pairKey(bt[i].p1.name,bt[i].p2.name);
          pairCount[pk2]=(pairCount[pk2]||0)+1;
        }
        if(bt.length>=2){
          allMatches.push({id:matchId++,t1:bt[0].id,t2:bt[1].id,blockNum:b+1,court:ci});
          recordEncounter([bt[0].p1,bt[0].p2,bt[1].p1,bt[1].p2]);
        }
      }
      blockInfo.push({blockNum:b+1,standby:null,dup:dup,skip:false,modeLabel:blockLabel});
    } else {
      // ── 일반 모드: 전체 선수 중 공평하게 (nc*4)명 선택 → 팀 구성 ──
      var needed=nc*4;
      var available=ps;
      if(available.length<4){blockInfo.push({blockNum:b+1,standby:null,dup:false,skip:true,modeLabel:''});continue;}
      // 출전 횟수 적은 순으로 needed명 선택 (인원이 부족하면 가능한 만큼)
      var actualNeeded=Math.min(needed,Math.floor(available.length/4)*4);
      if(actualNeeded<4) actualNeeded=4;
      // 모드별 선수 선택
      var playing;
      if(blockMode==='sameclose'){
        // 출전 공평성 지킨 actualNeeded명 → 등급순 정렬 (비슷한 수준끼리)
        var pool=pickFewestPlayers(available,actualNeeded,b);
        pool.sort(function(a,b){return lsc(a)-lsc(b);});
        playing=pool;
      } else if(blockMode==='samewide'){
        // 넓게: 공평성 지킨 actualNeeded명 확보 → 등급순 정렬 후 인접하게 살짝 섞기
        var pool=pickFewestPlayers(available,actualNeeded,b);
        pool.sort(function(a,b){return lsc(a)-lsc(b);});
        // 인접한 사람끼리만 가볍게 셔플 (등급 인접 섞임, 공평성은 유지)
        for(var sw=0;sw<pool.length-1;sw+=2){
          if(Math.random()<0.5){var tmp=pool[sw];pool[sw]=pool[sw+1];pool[sw+1]=tmp;}
        }
        playing=pool;
      } else {
        playing=pickFewestPlayers(available,actualNeeded,b);
      }
      var r=buildWithMode(playing,tempH,blockMode);
      var blockTeams=r.teams.slice(0,nc*2);
      // 랜덤/순환 모드: 다양성 최대화 분할
      if(blockMode==='random'&&nc===2&&blockTeams.length===4){
        // 2코트(8명): 완전탐색으로 최적 분할
        var eight=[];
        for(var pi=0;pi<blockTeams.length;pi++){
          eight.push(blockTeams[pi].p1);
          eight.push(blockTeams[pi].p2);
        }
        var split=splitInto2Games(eight);
        if(split){
          blockTeams[0].p1=split.g1[0][0]; blockTeams[0].p2=split.g1[0][1];
          blockTeams[1].p1=split.g1[1][0]; blockTeams[1].p2=split.g1[1][1];
          blockTeams[2].p1=split.g2[0][0]; blockTeams[2].p2=split.g2[0][1];
          blockTeams[3].p1=split.g2[1][0]; blockTeams[3].p2=split.g2[1][1];
        }
      } else if(blockMode==='random'&&nc>=3&&blockTeams.length>=6){
        // 3코트 이상: 모든 출전자를 다양성 기준으로 게임별 재분할
        var allP=[];
        for(var pi=0;pi<blockTeams.length;pi++){allP.push(blockTeams[pi].p1);allP.push(blockTeams[pi].p2);}
        var games=splitIntoGames(allP,nc);
        var ti=0;
        for(var gi=0;gi<games.length;gi++){
          blockTeams[ti].p1=games[gi][0][0]; blockTeams[ti].p2=games[gi][0][1]; ti++;
          blockTeams[ti].p1=games[gi][1][0]; blockTeams[ti].p2=games[gi][1][1]; ti++;
        }
      } else if(blockMode==='random') {
        // 1코트: 4명 페어링만 최적화
        for(var pi=0;pi<blockTeams.length-1;pi+=2){
          var opt=optimizePairing(blockTeams[pi],blockTeams[pi+1]);
          if(opt){
            blockTeams[pi].p1=opt[0].p1;blockTeams[pi].p2=opt[0].p2;
            blockTeams[pi+1].p1=opt[1].p1;blockTeams[pi+1].p2=opt[1].p2;
          }
        }
      }
      for(var i=0;i<blockTeams.length;i++){
        var kk=pk(blockTeams[i].p1,blockTeams[i].p2);
        if(tempH.indexOf(kk)===-1) tempH.push(kk);
        blockTeams[i].id=teamId++;blockTeams[i].blockNum=b+1;
        allTeams.push(blockTeams[i]);
        // 출전 횟수 + 마지막 출전 세트 + 페어 카운트 업데이트
        playCount[blockTeams[i].p1.name]=(playCount[blockTeams[i].p1.name]||0)+1;
        playCount[blockTeams[i].p2.name]=(playCount[blockTeams[i].p2.name]||0)+1;
        lastPlayedSet[blockTeams[i].p1.name]=b;
        lastPlayedSet[blockTeams[i].p2.name]=b;
        var pk2=pairKey(blockTeams[i].p1.name,blockTeams[i].p2.name);
        pairCount[pk2]=(pairCount[pk2]||0)+1;
      }
      for(var i=0;i<blockTeams.length-1;i+=2){
        allMatches.push({id:matchId++,t1:blockTeams[i].id,t2:blockTeams[i+1].id,blockNum:b+1,court:(i/2)+1});
        recordEncounter([blockTeams[i].p1,blockTeams[i].p2,blockTeams[i+1].p1,blockTeams[i+1].p2]);
      }
      // 쉬는 사람 (대기자) 계산 - 1명 차이 날 때만 standby 표시 (코트 수 부족시엔 표시 안 함)
      var resting=available.filter(function(p){
        for(var i=0;i<playing.length;i++) if(playing[i].name===p.name) return false;
        return true;
      });
      // standby는 인원이 안 맞아 어쩔 수 없이 1명만 빠질 때만 (5명, 9명 같은 경우)
      var standbyOne=(resting.length===1&&available.length<nc*4+2)?resting[0]:null;
      blockInfo.push({blockNum:b+1,standby:standbyOne,dup:r.dup,skip:false,modeLabel:blockLabel,resting:resting});
    }
  }
  // 늦참자 합류 세트 추가 (늦참 전원 포함)
  if(lates.length>0){
    var psWithLate=psAll; // 전체 (기존+늦참)
    var hasGroupsL=false;
    var g1L=psWithLate.filter(function(p){return (S.playerGroups[p.name]||1)===1;});
    var g2L=psWithLate.filter(function(p){return (S.playerGroups[p.name]||1)===2;});
    if(S.groupMode!=='any'&&g1L.length>=2&&g2L.length>=2) hasGroupsL=true;
    var lateBlockMode=S.pairMode==='cycle'?getCycleMode(numRot):S.pairMode;
    var lateLabel='';

    if(hasGroupsL){
      var rl1=buildWithMode(g1L,tempH,lateBlockMode);
      var rl2=buildWithMode(g2L,tempH,lateBlockMode);
      var bt1L=rl1.teams.slice(0,2),bt2L=rl2.teams.slice(0,2);
      for(var i=0;i<bt1L.length;i++){bt1L[i].id=teamId++;bt1L[i].blockNum=numRot+1;bt1L[i].grp=1;allTeams.push(bt1L[i]);}
      for(var i=0;i<bt2L.length;i++){bt2L[i].id=teamId++;bt2L[i].blockNum=numRot+1;bt2L[i].grp=2;allTeams.push(bt2L[i]);}
      if(bt1L.length>=2) allMatches.push({id:matchId++,t1:bt1L[0].id,t2:bt1L[1].id,blockNum:numRot+1,court:1});
      if(bt2L.length>=2) allMatches.push({id:matchId++,t1:bt2L[0].id,t2:bt2L[1].id,blockNum:numRot+1,court:2});
      blockInfo.push({blockNum:numRot+1,standby:null,dup:rl1.dup||rl2.dup,skip:false,modeLabel:lateLabel});
    } else {
      if(psWithLate.length>=4){
        var rl=buildWithMode(psWithLate,tempH,lateBlockMode);
        for(var i=0;i<rl.teams.length;i++){rl.teams[i].id=teamId++;rl.teams[i].blockNum=numRot+1;allTeams.push(rl.teams[i]);}
        for(var i=0;i<rl.teams.length-1;i+=2) allMatches.push({id:matchId++,t1:rl.teams[i].id,t2:rl.teams[i+1].id,blockNum:numRot+1});
        blockInfo.push({blockNum:numRot+1,standby:null,dup:rl.dup,skip:false,modeLabel:lateLabel});
      }
    }
  }

  return{teams:allTeams,matches:allMatches,blockInfo:blockInfo};
}

function mkMatches(ts){
  var all=[],id=0,i,j;
  // 팀 ID → 팀 객체 빠른 조회
  var tmap={};for(i=0;i<ts.length;i++) tmap[ts[i].id]=ts[i];

  for(i=0;i<ts.length;i++)
    for(j=i+1;j<ts.length;j++)
      all.push({id:id++,t1:ts[i].id,t2:ts[j].id,blockNum:0});

  // 혼합 모드: 그룹 간 매치 먼저
  if(S.matchMode==='mixed'){
    all.sort(function(a,b){
      var aMix=(S.groups[a.t1]!==S.groups[a.t2])?1:0;
      var bMix=(S.groups[b.t1]!==S.groups[b.t2])?1:0;
      return bMix-aMix;
    });
  }
  // 게임 수 제한 (모두 랜덤 추출)
  if(S.numGames>0&&S.numGames<all.length){
    if(S.matchMode!=='mixed') all=shuf(all);
    all=all.slice(0,S.numGames);
  }
  for(var k=0;k<all.length;k++) all[k].id=k;
  return all;
}
function copyResults(){
  var ms=S.matches,ts=S.teams;
  var lines=['⚡🏸 피카츄의 배드민턴매치 (라운드 '+S.round+')','──────────────'];
  var curBlock=-1;
  for(var i=0;i<ms.length;i++){
    var m=ms[i],t1=null,t2=null;
    for(var j=0;j<ts.length;j++){if(ts[j].id===m.t1)t1=ts[j];if(ts[j].id===m.t2)t2=ts[j];}
    if(S.matchMode==='rotation'&&m.blockNum!==curBlock){curBlock=m.blockNum;lines.push('[ 세트 '+curBlock+' ]');}
    lines.push((i+1)+'게임  '+t1.p1.name+' & '+t1.p2.name+'  vs  '+t2.p1.name+' & '+t2.p2.name);
  }
  if(S.standby)lines.push('──────────────\n⏳ 대기: '+S.standby.name);
  else lines.push('──────────────');
  var text=lines.join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){toast('📋 복사됐어요! 카톡에 붙여넣기 하세요');}).catch(function(){fbCopy(text);});}else{fbCopy(text);}
}
function fbCopy(text){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('📋 복사됐어요!');}catch(e){toast('직접 선택해서 복사해 주세요');}document.body.removeChild(ta);}

function shareApp(){

// ── 대진표 이미지 생성 ──────────────────────────────────────────────
function generateResultImage(){
  var ms=S.matches,ts=S.teams;
  var COURT_COLS=['#4fc3f7','#f48fb1','#66bb6a','#f1d035','#f18835','#a278f1'];
  var KO='"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif';

  // 세트별, 코트별 그룹핑
  var setsMap={},blockOrder=[];
  for(var i=0;i<ms.length;i++){
    var m=ms[i],t1=null,t2=null;
    for(var j=0;j<ts.length;j++){if(ts[j].id===m.t1)t1=ts[j];if(ts[j].id===m.t2)t2=ts[j];}
    if(!t1||!t2) continue;
    if(t1.grp&&t2.grp&&t1.grp!==t2.grp) continue;
    var cid=(t1.grp)||m.court||1;
    var bn=m.blockNum||0;
    if(!setsMap[bn]){setsMap[bn]={};blockOrder.push(bn);}
    if(!setsMap[bn][cid]) setsMap[bn][cid]=[];
    setsMap[bn][cid].push({m:m,t1:t1,t2:t2});
  }

  // 세트 수에 따라 컬럼 수 자동 결정
  var totalSets=blockOrder.length;
  // 최대 코트 수 파악
  var maxCourts=1;
  for(var si=0;si<blockOrder.length;si++){
    var nCt=Object.keys(setsMap[blockOrder[si]]).length;
    if(nCt>maxCourts) maxCourts=nCt;
  }
  // 코트가 많으면 이미지 컬럼을 줄여서 각 코트가 넓게 보이도록
  var imgCols;
  if(maxCourts>=3){
    imgCols=1; // 3코트 이상이면 세트를 1열로 (각 세트 안에서 코트 가로 배치)
  } else {
    imgCols=totalSets>20?3:(totalSets>10?2:1);
  }

  // 세트별 높이 미리 계산
  var setLabelH=24,cardH=42,cardGap=4,setGap=12;
  var setHeights=[];
  for(var si=0;si<blockOrder.length;si++){
    var setData=setsMap[blockOrder[si]];
    var courtIds=Object.keys(setData);
    var maxCards=0;
    for(var ci=0;ci<courtIds.length;ci++) maxCards=Math.max(maxCards,setData[courtIds[ci]].length);
    setHeights.push(setLabelH+maxCards*(cardH+cardGap)+setGap);
  }

  // 캔버스 너비/높이 (코트 많으면 넓게)
  var W;
  if(maxCourts>=3){
    W=Math.max(700,maxCourts*230); // 코트당 약 230px 확보
  } else {
    W=imgCols===1?700:(imgCols===2?900:1100);
  }
  var padX=20,headerH=90;
  var colGap=12;
  var colW=(W-padX*2-colGap*(imgCols-1))/imgCols;

  // 세트를 컬럼별로 배분 (높이 균형)
  var colHeights=[];for(var ci=0;ci<imgCols;ci++) colHeights.push(0);
  var setCols=[]; // 각 세트가 어느 컬럼인지
  // 단순 순차 배분 (전체 세트 / 컬럼 수)
  var setsPerCol=Math.ceil(totalSets/imgCols);
  for(var si=0;si<totalSets;si++) setCols.push(Math.floor(si/setsPerCol));

  // 컬럼별 누적 높이 계산
  for(var si=0;si<totalSets;si++) colHeights[setCols[si]]+=setHeights[si];
  var maxColH=0;for(var ci=0;ci<imgCols;ci++) maxColH=Math.max(maxColH,colHeights[ci]);
  var H=headerH+maxColH+40;

  var canvas=document.createElement('canvas');
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');

  // 배경
  ctx.fillStyle='#0d3b2e';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#c8f135';ctx.fillRect(0,0,W,4);

  // 타이틀
  ctx.textAlign='center';
  ctx.fillStyle='#c8f135';ctx.font='bold 28px '+KO;
  ctx.fillText('⚡ 피카츄의 배드민턴매치',W/2,42);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='13px '+KO;
  ctx.fillText('라운드 '+S.round+'  ·  총 '+ms.length+'게임',W/2,64);
  ctx.strokeStyle='rgba(200,241,53,0.25)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(padX,76);ctx.lineTo(W-padX,76);ctx.stroke();

  // 컬럼별 y 추적
  var colY=[];for(var ci=0;ci<imgCols;ci++) colY.push(headerH);

  // 세트별 렌더링
  for(var si=0;si<blockOrder.length;si++){
    var bn=blockOrder[si];
    var setData=setsMap[bn];
    var courtIds=Object.keys(setData).sort(function(a,b){return a-b;});
    var ncols=courtIds.length;
    var col=setCols[si];
    var colX=padX+col*(colW+colGap);
    var y=colY[col];

    // 세트 라벨
    var bi=null;for(var bi2=0;bi2<S.blockInfo.length;bi2++)if(S.blockInfo[bi2].blockNum===bn){bi=S.blockInfo[bi2];break;}
    var sLabel='세트 '+bn+(bi&&bi.modeLabel?'  ·  '+bi.modeLabel:'');
    ctx.textAlign='left';
    ctx.fillStyle='#c8f135';ctx.font='bold 13px '+KO;
    ctx.fillText(sLabel,colX,y+14);
    y+=setLabelH;

    // 코트 가로 배치
    var subColW=(colW-(ncols-1)*6)/ncols;
    var maxCards=0;
    for(var ci=0;ci<courtIds.length;ci++) maxCards=Math.max(maxCards,setData[courtIds[ci]].length);

    for(var ci=0;ci<courtIds.length;ci++){
      var cid=parseInt(courtIds[ci]);
      var cc=COURT_COLS[(cid-1)%COURT_COLS.length];
      var cms=setData[courtIds[ci]];
      var subX=colX+ci*(subColW+6);

      // 카드들
      for(var mi=0;mi<cms.length;mi++){
        var mt1=cms[mi].t1,mt2=cms[mi].t2;
        var cy=y+mi*(cardH+cardGap);

        // 카드 배경 + 왼쪽 색 바
        ctx.fillStyle='rgba(255,255,255,0.06)';
        roundRect(ctx,subX,cy,subColW,cardH,8);ctx.fill();
        ctx.fillStyle=cc;ctx.fillRect(subX,cy,3,cardH);

        // 코트 표시 (멀티코트일 때만, 작게)
        if(ncols>1){
          ctx.textAlign='left';ctx.fillStyle=cc;ctx.font='bold 9px '+KO;
          ctx.fillText(cid+'코트',subX+8,cy+12);
        }

        // 이름 한 줄로 (A·B  vs  C·D)
        var t1name=mt1.p1.name+'·'+mt1.p2.name;
        var t2name=mt2.p1.name+'·'+mt2.p2.name;
        var midY=cy+cardH/2+(ncols>1?6:2);

        ctx.textAlign='left';ctx.fillStyle='#fff';ctx.font='bold 13px '+KO;
        ctx.fillText(t1name,subX+8,midY);

        ctx.textAlign='center';ctx.fillStyle=cc;ctx.font='bold 10px '+KO;
        ctx.fillText('vs',subX+subColW/2,midY);

        ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 13px '+KO;
        ctx.fillText(t2name,subX+subColW-8,midY);
      }
    }

    y+=maxCards*(cardH+cardGap)+setGap-cardGap;
    colY[col]=y;
  }

  // 푸터
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.font='11px '+KO;ctx.fillText('피카츄의 배드민턴매치',W/2,H-14);

  canvas.toBlob(function(blob){
    var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isIOS){
      var file=new File([blob],'배드민턴대진표.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({title:'피카츄의 배드민턴매치 대진표',files:[file]})
          .catch(function(e){if(e.name!=='AbortError') dlBlob(blob);});
      } else { dlBlob(blob); }
    } else {
      dlBlob(blob);
    }
  },'image/png');
}

// 둥근 사각형 헬퍼
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function dlBlob(blob){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.download='배드민턴대진표.png';
  a.href=url;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},2000);
  toast('📸 이미지 저장됐어요!');
}
